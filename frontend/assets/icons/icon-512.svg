  <rect x="44" y="90" width="10" height="330" rx="5" fill="#555"/>
  <rect x="64" y="90" width="10" height="330" rx="5" fill="#444"/>
  <rect x="84" y="90" width="10" height="330" rx="5" fill="#333"/>

  <!-- White N -->
