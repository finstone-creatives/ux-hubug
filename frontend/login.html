<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Sign In — Nxt-door</title>
  <meta name="description" content="Sign in to your Nxt-door account to access exclusive creator content, live streams, and more." />
  <meta name="robots" content="noindex" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#e50914" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Nxt-door" />
  <link rel="apple-touch-icon" href="/assets/icons/icon-192.svg" />
  <link rel="icon" href="/assets/icons/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.14.0/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="/assets/css/login.css">
</head>
<body class="auth-page">
  <div class="particles" id="particles"></div>
  <div class="floating-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
    <div class="shape shape-4"></div>
  </div>
  <div class="glow-orb orb-1"></div>
  <div class="glow-orb orb-2"></div>
  <div class="glow-orb orb-3"></div>
  
  <div class="auth-container">
    <div class="auth-visual">
      <div class="visual-content">
        <div class="logo-glow"><span>NX</span></div>
        <h2 class="visual-title">Welcome Back</h2>
        <p class="visual-subtitle">Sign in to continue your journey with Africa's premier creator platform.</p>
        <div class="features-list">
          <div class="feature-item"><div class="feature-icon"><i class="ti ti-live-photo"></i></div><span>Live Stream with Creators</span></div>
          <div class="feature-item"><div class="feature-icon"><i class="ti ti-video"></i></div><span>Exclusive Premium Content</span></div>
          <div class="feature-item"><div class="feature-icon"><i class="ti ti-message-circle"></i></div><span>Connect & Message</span></div>
        </div>
      </div>
    </div>
    
    <div class="auth-form-section">
      <div class="form-header">
        <h1>Sign In</h1>
        <p>Enter your credentials to access your account</p>
      </div>
      <div class="alert-box" id="alertBox"><i class="ti ti-alert-circle"></i><span id="alertMessage"></span></div>
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="input-wrapper">
          <label for="email">Email Address</label>
          <i class="ti ti-mail input-icon"></i>
          <input type="email" id="email" class="input-field" placeholder="you@example.com" required autocomplete="email"/>
        </div>
        <div class="input-wrapper">
          <label for="password">Password</label>
          <i class="ti ti-lock input-icon"></i>
          <input type="password" id="password" class="input-field" placeholder="Enter your password" required autocomplete="current-password"/>
          <button type="button" class="toggle-password" onclick="togglePassword(this)"><i class="ti ti-eye"></i></button>
        </div>
        <div class="form-options">
          <label class="remember-me"><input type="checkbox" id="rememberMe"/><span>Remember me</span></label>
          <a href="#" class="forgot-link" onclick="showForgotModal(); return false;">Forgot password?</a>
        </div>
        <button type="submit" class="submit-btn" id="loginBtn"><i class="ti ti-login"></i><span>Sign In</span></button>
      </form>
      <div class="divider">or continue with</div>
      <div class="social-login">
        <button class="social-btn" onclick="socialLogin('google')"><i class="ti ti-brand-google"></i>Google</button>
        <button class="social-btn" onclick="socialLogin('apple')"><i class="ti ti-brand-apple"></i>Apple</button>
      </div>
      <p class="auth-link">Don't have an account? <a href="/register.html">Create account</a></p>
    </div>
  </div>

  <script src="/assets/js/app.js"></script>
  <script>
    if (Auth.isLoggedIn()) {
      const u = Auth.getUser();
      window.location.href = u?.role === 'creator' ? '/creator/dashboard.html' : '/pages/feed.html';
    }
    
    function createParticles() {
      const container = document.getElementById('particles');
      const colors = ['#e50914', '#e500cc', '#ff6b6b', '#c084fc', '#60a5fa'];
      for (let i = 0; i < 25; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.width = particle.style.height = Math.random() * 6 + 2 + 'px';
        particle.style.background = colors[Math.floor(Math.random() * colors.length)];
        particle.style.animation = `particle ${Math.random() * 10 + 10}s linear infinite`;
        particle.style.animationDelay = Math.random() * 5 + 's';
        container.appendChild(particle);
      }
    }
    createParticles();
    
    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const alertBox = document.getElementById('alertBox');
      const alertMessage = document.getElementById('alertMessage');
      btn.classList.add('spinning');
      btn.disabled = true;
      btn.querySelector('span').textContent = 'Signing in...';
      try {
        const data = await api.post('/auth/login', {
          email: document.getElementById('email').value,
          password: document.getElementById('password').value
        });
        if (data.success) {
          Auth.setSession(data.token, data.user);
          window.location.href = data.user.role === 'creator' ? '/creator/dashboard.html' : 
                                 (data.user.role === 'admin' || data.user.role === 'moderator') ? '/admin/dashboard.html' : '/pages/feed.html';
        } else {
          alertBox.className = 'alert-box error';
          alertMessage.textContent = data.message;
          alertBox.style.display = 'flex';
          btn.classList.remove('spinning');
          btn.disabled = false;
          btn.querySelector('span').textContent = 'Sign In';
        }
      } catch (err) {
        alertBox.className = 'alert-box error';
        alertMessage.textContent = err?.message || 'Server error. Please try again.';
        alertBox.style.display = 'flex';
        btn.classList.remove('spinning');
        btn.disabled = false;
        btn.querySelector('span').textContent = 'Sign In';
      }
    }
    
    function togglePassword(btn) {
      const input = btn.previousElementSibling.previousElementSibling;
      input.type = input.type === 'password' ? 'text' : 'password';
      btn.querySelector('i').className = `ti ti-eye${input.type === 'text' ? '-off' : ''}`;
    }
    
    function showForgotModal() {
      alert('Password reset feature coming soon!');
    }
    
    function socialLogin(provider) {
      alert(`${provider} login coming soon!`);
    }
  </script>
</body>
</html>
