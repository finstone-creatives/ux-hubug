<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Watch Live — Nxt-door</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.14.0/dist/tabler-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/main.css" />
  <style>
    .watch-layout { display:grid; grid-template-columns:1fr 380px; gap:24px; }
    .main-player { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-xl); overflow:hidden; }
    .player-container { position:relative; background:#000; aspect-ratio:16/9; display:flex; align-items:center; justify-content:center; }
    .player-container video { width:100%; height:100%; object-fit:cover; }
    .live-badge {
      position:absolute;
      top:16px;
      left:16px;
      background:var(--red);
      color:white;
      padding:6px 12px;
      border-radius:var(--radius-full);
      font-size:0.8rem;
      font-weight:600;
      display:flex;
      align-items:center;
      gap:6px;
      animation:pulse 2s infinite;
    }
    .live-badge::before {
      content:'';
      width:8px;
      height:8px;
      background:white;
      border-radius:50%;
    }
    .viewer-count {
      position:absolute;
      top:16px;
      right:16px;
      background:rgba(0,0,0,0.7);
      color:white;
      padding:6px 12px;
      border-radius:var(--radius-full);
      font-size:0.8rem;
      display:flex;
      align-items:center;
      gap:6px;
    }
    .stream-info { padding:20px; }
    .stream-title { font-size:1.4rem; font-weight:700; margin:0 0 12px; }
    .stream-meta { display:flex; align-items:center; gap:16px; color:var(--text3); font-size:0.9rem; margin-bottom:16px; flex-wrap:wrap; }
    .creator-badge { display:flex; align-items:center; gap:8px; }
    .creator-avatar { width:32px; height:32px; border-radius:50%; background:var(--grad-brand); display:flex; align-items:center; justify-content:center; font-weight:700; color:white; font-size:0.8rem; }
    .stream-actions { display:flex; gap:12px; margin-top:16px; padding-top:16px; border-top:1px solid var(--border); }
    .action-btn { flex:1; padding:10px; border-radius:var(--radius); border:1px solid var(--border2); background:var(--surface2); color:var(--text); cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; transition:all 0.3s; }
    .action-btn:hover { background:var(--card2); border-color:var(--border3); }
    .action-btn.primary { background:var(--grad-brand); border-color:transparent; color:white; }
    .action-btn.primary:hover { opacity:0.9; }
    
    .chat-section { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-xl); overflow:hidden; display:flex; flex-direction:column; max-height:calc(100vh - 140px); }
    .chat-header { padding:16px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
    .chat-header h3 { font-size:1rem; margin:0; }
    .chat-messages { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:12px; }
    .chat-message { display:flex; gap:10px; }
    .chat-avatar { width:28px; height:28px; border-radius:50%; background:var(--card3); display:flex; align-items:center; justify-content:center; font-size:0.7rem; font-weight:600; flex-shrink:0; }
    .chat-content { flex:1; }
    .chat-username { font-weight:600; font-size:0.85rem; color:var(--text); }
    .chat-text { font-size:0.85rem; color:var(--text2); line-height:1.4; margin-top:2px; }
    .chat-time { font-size:0.7rem; color:var(--text4); margin-left:6px; }
    .chat-input-area { padding:16px; border-top:1px solid var(--border); display:flex; gap:10px; }
    .chat-input { flex:1; padding:10px 14px; background:var(--surface2); border:1px solid var(--border2); border-radius:var(--radius-full); color:var(--text); font-size:0.9rem; outline:none; }
    .chat-input:focus { border-color:var(--red); }
    .chat-send { width:40px; height:40px; border-radius:50%; background:var(--grad-brand); border:none; color:white; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.3s; }
    .chat-send:hover { transform:scale(1.05); }
    
    .stream-offline { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:60px 20px; text-align:center; color:var(--text3); }
    .stream-offline i { font-size:64px; margin-bottom:16px; color:var(--text4); }
    .stream-offline h3 { color:var(--text); margin-bottom:8px; }
    
    @keyframes pulse {
      0%, 100% { opacity:1; }
      50% { opacity:0.7; }
    }
    @media(max-width:1024px){ 
      .watch-layout { grid-template-columns:1fr; }
      .chat-section { max-height:500px; }
    }
  </style>
</head>
<body>
  <div class="sidebar-overlay" onclick="Sidebar.close()"></div>
  <aside class="app-sidebar" id="appSidebar"></aside>
  <header class="app-header" id="appHeader"></header>
  <div class="page-wrap">
    <main class="main-content">
      <div class="inner-lg">
        <div id="watchLayout" class="watch-layout">
          <div class="main-player" id="mainPlayer" style="display:none;">
            <div class="player-container" id="playerContainer">
              <div class="live-badge">LIVE</div>
              <div class="viewer-count" id="viewerCount"><i class="ti ti-eye"></i> <span>0</span></div>
              <video id="liveVideo" playsinline></video>
              <div id="playerPlaceholder" style="color:white;text-align:center;padding:40px;">
                <i class="ti ti-live-photo" style="font-size:48px;margin-bottom:16px;opacity:0.5;"></i>
                <p>Waiting for stream...</p>
              </div>
            </div>
            <div class="stream-info">
              <h2 class="stream-title" id="streamTitle">Loading...</h2>
              <div class="stream-meta">
                <div class="creator-badge">
                  <div class="creator-avatar" id="creatorAvatar">?</div>
                  <span id="creatorName">Creator</span>
                  <span id="creatorCategory" style="color:var(--text4);">• Category</span>
                </div>
                <span id="startedTime">Started now</span>
              </div>
              <div class="stream-actions">
                <button class="action-btn primary" onclick="followCreator()"><i class="ti ti-heart"></i> Follow</button>
                <button class="action-btn" onclick="tipCreator()"><i class="ti ti-gift"></i> Tip</button>
                <button class="action-btn" onclick="shareStream()"><i class="ti ti-share"></i> Share</button>
              </div>
            </div>
          </div>
          
          <div class="chat-section" id="chatSection" style="display:none;">
            <div class="chat-header">
              <h3><i class="ti ti-message-circle"></i> Live Chat</h3>
              <span style="font-size:0.85rem;color:var(--text3);" id="chatUserCount">0 online</span>
            </div>
            <div class="chat-messages" id="chatMessages">
              <div class="chat-message" style="justify-content:center;opacity:0.6;">
                <span style="font-size:0.8rem;">Welcome to the live chat!</span>
              </div>
            </div>
            <div class="chat-input-area">
              <input type="text" class="chat-input" id="chatInput" placeholder="Say something..." maxlength="200" />
              <button class="chat-send" onclick="sendChat()"><i class="ti ti-send"></i></button>
            </div>
          </div>
        </div>
        
        <div id="streamOffline" class="stream-offline" style="display:none;">
          <i class="ti ti-player-stop"></i>
          <h3>Stream Offline</h3>
          <p>This live session has ended or is not available.</p>
          <a href="/pages/live.html" class="btn btn-brand btn-md" style="margin-top:20px;"><i class="ti ti-arrow-left"></i> Browse Live Streams</a>
        </div>
      </div>
    </main>
  </div>
  
  <script src="/assets/js/app.js"></script>
  <script src="/assets/js/layout.js"></script>
  <script>
    Layout.init('Watch Live');
    
    let currentLiveId = null;
    let chatMessages = [];
    
    function getQueryParam(name) {
      return new URLSearchParams(window.location.search).get(name) || '';
    }
    
    function addChatMessage(username, text, isSelf = false) {
      const container = document.getElementById('chatMessages');
      const msg = document.createElement('div');
      msg.className = 'chat-message';
      const initials = username.slice(0, 2).toUpperCase();
      msg.innerHTML = `
        <div class="chat-avatar" style="background:${isSelf ? 'var(--grad-brand)' : 'var(--card3)'};color:${isSelf ? 'white' : 'var(--text)'}">${initials}</div>
        <div class="chat-content">
          <span class="chat-username">${username}${isSelf ? ' <span style="color:var(--red);">(You)</span>' : ''}<span class="chat-time">${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span></span>
          <div class="chat-text">${fmt.esc(text)}</div>
        </div>
      `;
      container.appendChild(msg);
      container.scrollTop = container.scrollHeight;
    }
    
    function sendChat() {
      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      if (!text) return;
      const user = Auth.getUser();
      const username = user?.displayName || user?.username || 'Guest';
      addChatMessage(username, text, true);
      input.value = '';
      
      // Emit to socket
      if (socket) {
        socket.emit('chat:message', { liveId: currentLiveId, text });
      }
    }
    
    document.getElementById('chatInput')?.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendChat();
    });
    
    async function loadWatchPage() {
      const id = getQueryParam('id');
      if (!id) {
        document.getElementById('streamOffline').style.display = 'flex';
        return;
      }
      currentLiveId = id;
      
      try {
        const response = await api.get(`/live/${encodeURIComponent(id)}`);
        if (!response.success || !response.live) throw new Error('Live not found');
        
        const live = response.live;
        
        // Show player
        document.getElementById('mainPlayer').style.display = 'block';
        document.getElementById('chatSection').style.display = 'flex';
        document.getElementById('streamOffline').style.display = 'none';
        
        // Update info
        document.getElementById('streamTitle').textContent = live.liveTitle || 'Live Stream';
        document.getElementById('creatorName').textContent = live.displayName || live.username || 'Creator';
        document.getElementById('creatorAvatar').textContent = (live.displayName || live.username || '??').slice(0, 2).toUpperCase();
        document.getElementById('creatorCategory').textContent = '• ' + (live.liveCategory || 'Live');
        document.getElementById('viewerCount').querySelector('span').textContent = live.liveViewers || 0;
        document.getElementById('chatUserCount').textContent = (live.liveViewers || 0) + ' watching';
        document.getElementById('startedTime').textContent = live.liveStartedAt ? 
          'Started ' + fmt.timeAgo(live.liveStartedAt) : 'Started now';
        
        // Join stream
        await api.post(`/live/${encodeURIComponent(id)}/join`);
        
        // Handle page unload
        window.addEventListener('beforeunload', () => {
          if (navigator.sendBeacon) {
            navigator.sendBeacon(`${API}/live/${encodeURIComponent(id)}/leave`);
          }
        });
        
        // Simulate some chat messages
        setTimeout(() => addChatMessage('User123', 'Hello everyone! 🔥'), 2000);
        setTimeout(() => addChatMessage('FanGirl', 'Love this stream! ❤️'), 4500);
        
      } catch (err) {
        document.getElementById('mainPlayer').style.display = 'none';
        document.getElementById('chatSection').style.display = 'none';
        document.getElementById('streamOffline').style.display = 'flex';
      }
    }
    
    function followCreator() {
      Toast.show('Followed creator!', 'success');
    }
    
    function tipCreator() {
      alert('Tip feature coming soon!');
    }
    
    function shareStream() {
      const url = window.location.href;
      if (navigator.share) {
        navigator.share({ title: 'Watch this live stream on Nxt-door', url });
      } else {
        navigator.clipboard?.writeText(url);
        Toast.show('Link copied!', 'success');
      }
    }
    
    loadWatchPage();
  </script>
</body>
</html>
