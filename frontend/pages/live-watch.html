<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Watch Live — Nxt-door</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.14.0/dist/tabler-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/main.css" />
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    .watch-layout { display:grid; grid-template-columns:1fr 380px; gap:24px; }
    .main-player { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-xl); overflow:hidden; }
    .player-container { position:relative; background:#000; aspect-ratio:16/9; display:flex; align-items:center; justify-content:center; }
    .player-container video { width:100%; height:100%; object-fit:cover; }
    .live-badge {
      position:absolute;
      top:16px;
      left:16px;
      background:var(--red);
      color:white;
      padding:6px 12px;
      border-radius:var(--radius-full);
      font-size:0.8rem;
      font-weight:600;
      display:flex;
      align-items:center;
      gap:6px;
      animation:pulse 2s infinite;
    }
    .live-badge::before {
      content:'';
      width:8px;
      height:8px;
      background:white;
      border-radius:50%;
    }
    .viewer-count {
      position:absolute;
      top:16px;
      right:16px;
      background:rgba(0,0,0,0.7);
      color:white;
      padding:6px 12px;
      border-radius:var(--radius-full);
      font-size:0.8rem;
      display:flex;
      align-items:center;
      gap:6px;
    }
    .stream-info { padding:20px; }
    .stream-title { font-size:1.4rem; font-weight:700; margin:0 0 12px; }
    .stream-meta { display:flex; align-items:center; gap:16px; color:var(--text3); font-size:0.9rem; margin-bottom:16px; flex-wrap:wrap; }
    .creator-badge { display:flex; align-items:center; gap:8px; }
    .creator-avatar { width:32px; height:32px; border-radius:50%; background:var(--grad-brand); display:flex; align-items:center; justify-content:center; font-weight:700; color:white; font-size:0.8rem; }
    .stream-actions { display:flex; gap:12px; margin-top:16px; padding-top:16px; border-top:1px solid var(--border); }
    .action-btn { flex:1; padding:10px; border-radius:var(--radius); border:1px solid var(--border2); background:var(--surface2); color:var(--text); cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; transition:all 0.3s; }
    .action-btn:hover { background:var(--card2); border-color:var(--border3); }
    .action-btn.primary { background:var(--grad-brand); border-color:transparent; color:white; }
    .action-btn.primary:hover { opacity:0.9; }
    
    .chat-section { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-xl); overflow:hidden; display:flex; flex-direction:column; max-height:calc(100vh - 140px); }
    .chat-header { padding:16px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
    .chat-header h3 { font-size:1rem; margin:0; }
    .chat-messages { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:12px; }
    .chat-message { display:flex; gap:10px; }
    .chat-avatar { width:28px; height:28px; border-radius:50%; background:var(--card3); display:flex; align-items:center; justify-content:center; font-size:0.7rem; font-weight:600; flex-shrink:0; }
    .chat-content { flex:1; }
    .chat-username { font-weight:600; font-size:0.85rem; color:var(--text); }
    .chat-text { font-size:0.85rem; color:var(--text2); line-height:1.4; margin-top:2px; }
    .chat-time { font-size:0.7rem; color:var(--text4); margin-left:6px; }
    .chat-input-area { padding:16px; border-top:1px solid var(--border); display:flex; gap:10px; }
    .chat-input { flex:1; padding:10px 14px; background:var(--surface2); border:1px solid var(--border2); border-radius:var(--radius-full); color:var(--text); font-size:0.9rem; outline:none; }
    .chat-input:focus { border-color:var(--red); }
    .chat-send { width:40px; height:40px; border-radius:50%; background:var(--grad-brand); border:none; color:white; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.3s; }
    .chat-send:hover { transform:scale(1.05); }
    
    .stream-offline { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:60px 20px; text-align:center; color:var(--text3); }
    .stream-offline i { font-size:64px; margin-bottom:16px; color:var(--text4); }
    .stream-offline h3 { color:var(--text); margin-bottom:8px; }
    
    @keyframes pulse {
      0%, 100% { opacity:1; }
      50% { opacity:0.7; }
    }
    @media(max-width:1024px){ 
      .watch-layout { grid-template-columns:1fr; }
      .chat-section { max-height:500px; }
    }
  </style>
</head>
<body>
  <div class="sidebar-overlay" onclick="Sidebar.close()"></div>
  <aside class="app-sidebar" id="appSidebar"></aside>
  <header class="app-header" id="appHeader"></header>
  <div class="page-wrap">
    <main class="main-content">
      <div class="inner-lg">
        <div id="watchLayout" class="watch-layout">
          <div class="main-player" id="mainPlayer" style="display:none;">
            <div class="player-container" id="playerContainer">
              <div class="live-badge">LIVE</div>
              <div class="viewer-count" id="viewerCount"><i class="ti ti-eye"></i> <span>0</span></div>
              <video id="liveVideo" playsinline></video>
              <div id="playerPlaceholder" style="color:white;text-align:center;padding:40px;">
                <i class="ti ti-live-photo" style="font-size:48px;margin-bottom:16px;opacity:0.5;"></i>
                <p>Waiting for stream...</p>
              </div>
            </div>
            <div class="stream-info">
              <h2 class="stream-title" id="streamTitle">Loading...</h2>
              <div class="stream-meta">
                <div class="creator-badge">
                  <div class="creator-avatar" id="creatorAvatar">?</div>
                  <span id="creatorName">Creator</span>
                  <span id="creatorCategory" style="color:var(--text4);">• Category</span>
                </div>
                <span id="startedTime">Started now</span>
              </div>
              <div class="stream-actions">
                <button class="action-btn primary" onclick="followCreator()"><i class="ti ti-heart"></i> Follow</button>
                <button class="action-btn" onclick="tipCreator()"><i class="ti ti-gift"></i> Tip</button>
                <button class="action-btn" onclick="shareStream()"><i class="ti ti-share"></i> Share</button>
              </div>
            </div>
          </div>
          
          <div class="chat-section" id="chatSection" style="display:none;">
            <div class="chat-header">
              <h3><i class="ti ti-message-circle"></i> Live Chat</h3>
              <span style="font-size:0.85rem;color:var(--text3);" id="chatUserCount">0 online</span>
            </div>
            <div class="chat-messages" id="chatMessages" style="flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px;scroll-behavior:smooth;">
            <!-- Messages will be added here dynamically -->
          </div>
            <div class="chat-input-area">
              <input type="text" class="chat-input" id="chatInput" placeholder="Say something..." maxlength="200" />
              <button class="chat-send" onclick="sendChat()"><i class="ti ti-send"></i></button>
            </div>
          </div>
        </div>
        
        <div id="streamOffline" class="stream-offline" style="display:none;">
          <i class="ti ti-player-stop"></i>
          <h3>Stream Offline</h3>
          <p>This live session has ended or is not available.</p>
          <a href="/pages/live.html" class="btn btn-brand btn-md" style="margin-top:20px;"><i class="ti ti-arrow-left"></i> Browse Live Streams</a>
        </div>
      </div>
    </main>
  </div>
  
  <script src="/assets/js/app.js"></script>
  <script src="/assets/js/layout.js"></script>
  <script>
    Layout.init('Watch Live');
    
    let currentLiveId = null;
    let chatMessages = [];
    
    function getQueryParam(name) {
      return new URLSearchParams(window.location.search).get(name) || '';
    }
    
    function addChatMessage(username, text, isSelf = false, isTip = false) {
      const container = document.getElementById('chatMessages');
      const msg = document.createElement('div');
      msg.className = 'chat-message' + (isTip ? ' tip-message' : '');
      msg.style.animation = 'slideIn 0.3s ease-out';
      const initials = username.slice(0, 2).toUpperCase();
      const avatarBg = isTip ? 'linear-gradient(135deg,var(--gold),#B8860B)' : (isSelf ? 'var(--grad-brand)' : 'var(--card3)');
      const usernameColor = isTip ? 'var(--gold)' : (isSelf ? 'var(--red)' : 'var(--text)');
      msg.innerHTML = `
        <div class="chat-avatar" style="background:${avatarBg};color:white;font-size:0.7rem;font-weight:600;display:flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;flex-shrink:0;">${isTip ? '$' : initials}</div>
        <div class="chat-content" style="flex:1;min-width:0;">
          <span class="chat-username" style="font-weight:600;font-size:0.85rem;color:${usernameColor};">${username}${isSelf && !isTip ? ' <span style="color:var(--red);font-size:0.75rem;">(You)</span>' : ''}<span class="chat-time" style="font-size:0.7rem;color:var(--text4);margin-left:6px;">${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span></span>
          <div class="chat-text" style="font-size:0.85rem;color:var(--text2);line-height:1.4;margin-top:2px;word-break:break-word;">${fmt.esc(text)}</div>
        </div>
      `;
      container.appendChild(msg);
      container.scrollTop = container.scrollHeight;
      
      // Keep only last 100 messages
      while (container.children.length > 100) {
        container.removeChild(container.firstChild);
      }
    }
    
    // Add system message
    function addSystemMessage(text) {
      const container = document.getElementById('chatMessages');
      const msg = document.createElement('div');
      msg.className = 'chat-message';
      msg.style.justifyContent = 'center';
      msg.style.opacity = '0.6';
      msg.style.padding = '8px 0';
      msg.innerHTML = `<span style="font-size:0.75rem;color:var(--text3);">${text}</span>`;
      container.appendChild(msg);
      container.scrollTop = container.scrollHeight;
    }
    
    function sendChat() {
      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      if (!text) return;
      const user = Auth.getUser();
      const username = user?.displayName || user?.username || 'Guest';
      
      // Emit to socket first
      if (socket && socket.connected) {
        socket.emit('live:message', { liveId: currentLiveId, text, username });
      } else {
        // Fallback: just show locally
        addChatMessage(username, text, true);
      }
      
      input.value = '';
      input.focus();
    }
    
    document.getElementById('chatInput')?.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendChat();
    });
    
    async function loadWatchPage() {
      const id = getQueryParam('id');
      if (!id) {
        document.getElementById('streamOffline').style.display = 'flex';
        return;
      }
      currentLiveId = id;
      
      try {
        const response = await api.get(`/live/${encodeURIComponent(id)}`);
        if (!response.success || !response.live) throw new Error('Live not found');
        
        const live = response.live;
        
        // Show player
        document.getElementById('mainPlayer').style.display = 'block';
        document.getElementById('chatSection').style.display = 'flex';
        document.getElementById('streamOffline').style.display = 'none';
        
        // Update info
        document.getElementById('streamTitle').textContent = live.liveTitle || 'Live Stream';
        document.getElementById('creatorName').textContent = live.displayName || live.username || 'Creator';
        document.getElementById('creatorAvatar').textContent = (live.displayName || live.username || '??').slice(0, 2).toUpperCase();
        document.getElementById('creatorCategory').textContent = '• ' + (live.liveCategory || 'Live');
        document.getElementById('viewerCount').querySelector('span').textContent = live.liveViewers || 0;
        document.getElementById('chatUserCount').textContent = (live.liveViewers || 0) + ' watching';
        document.getElementById('startedTime').textContent = live.liveStartedAt ? 
          'Started ' + fmt.timeAgo(live.liveStartedAt) : 'Started now';
        
        // Join stream
        await api.post(`/live/${encodeURIComponent(id)}/join`);
        
        // Handle page unload
        window.addEventListener('beforeunload', () => {
          if (navigator.sendBeacon) {
            navigator.sendBeacon(`${API}/live/${encodeURIComponent(id)}/leave`);
          }
        });
        
        // Welcome message
        addSystemMessage('Welcome to the live chat! Be respectful.');
        
        // Connect to Socket.io for real-time chat
        connectSocket(currentLiveId);
        
      } catch (err) {
        document.getElementById('mainPlayer').style.display = 'none';
        document.getElementById('chatSection').style.display = 'none';
        document.getElementById('streamOffline').style.display = 'flex';
      }
    }
    
    function followCreator() {
      Toast.show('Followed creator!', 'success');
    }
    
    function tipCreator() {
      alert('Tip feature coming soon!');
    }
    
    function shareStream() {
      const url = window.location.href;
      if (navigator.share) {
        navigator.share({ title: 'Watch this live stream on Nxt-door', url });
      } else {
        navigator.clipboard?.writeText(url);
        Toast.show('Link copied!', 'success');
      }
    }
    
    loadWatchPage();
  </script>
  
  <!-- Mobile Bottom Navigation -->
  <nav class="mobile-bottom-nav" id="mobileBottomNav" style="display:none;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:8px 0 calc(8px + env(safe-area-inset-bottom));z-index:900;justify-content:space-around;">

    <a href="/pages/live.html" class="mobile-nav-item active" style="display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 12px;color:var(--red);text-decoration:none;font-size:0.7rem;"><i class="ti ti-live-photo" style="font-size:1.3rem;"></i><span>Live</span></a>
    <a href="/pages/messages.html" class="mobile-nav-item" style="display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 12px;color:var(--text3);text-decoration:none;font-size:0.7rem;"><i class="ti ti-message" style="font-size:1.3rem;"></i><span>Chat</span></a>
    <a href="/pages/profile.html" class="mobile-nav-item" style="display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 12px;color:var(--text3);text-decoration:none;font-size:0.7rem;"><i class="ti ti-user" style="font-size:1.3rem;"></i><span>Profile</span></a>
  </nav>
  
  <!-- Mobile Tip FAB -->
  <button class="tip-fab" id="tipFab" onclick="openTipModal()" style="display:none;position:fixed;bottom:calc(80px + env(safe-area-inset-bottom));right:20px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--gold),#B8860B);border:none;color:white;cursor:pointer;z-index:899;box-shadow:0 4px 20px rgba(255,215,0,0.4);align-items:center;justify-content:center;">
    <i class="ti ti-gift" style="font-size:1.4rem;"></i>
  </button>
  
  <!-- Tip Modal -->
  <div class="modal-backdrop" id="tipModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:1000;align-items:center;justify-content:center;">
    <div class="modal-box" style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);padding:24px;max-width:400px;width:90%;max-height:90vh;overflow-y:auto;">
      <button class="modal-close" onclick="closeTipModal()" style="position:absolute;top:16px;right:16px;background:none;border:none;color:var(--text3);cursor:pointer;font-size:1.2rem;"><i class="ti ti-x"></i></button>
      <div style="text-align:center;margin-bottom:20px;">
        <div style="width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,var(--gold),#B8860B);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;"><i class="ti ti-gift" style="font-size:1.8rem;color:white;"></i></div>
        <h3 style="margin:0;font-size:1.3rem;">Send a Tip</h3>
        <p style="color:var(--text3);font-size:0.9rem;margin:8px 0 0;">Show your appreciation</p>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;">
        <button class="tip-amount-btn" onclick="selectTip(5)" style="padding:12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface2);color:var(--text);font-weight:600;cursor:pointer;transition:all 0.2s;">$5</button>
        <button class="tip-amount-btn" onclick="selectTip(10)" style="padding:12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface2);color:var(--text);font-weight:600;cursor:pointer;transition:all 0.2s;">$10</button>
        <button class="tip-amount-btn" onclick="selectTip(20)" style="padding:12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface2);color:var(--text);font-weight:600;cursor:pointer;transition:all 0.2s;">$20</button>
        <button class="tip-amount-btn" onclick="selectTip(50)" style="padding:12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface2);color:var(--text);font-weight:600;cursor:pointer;transition:all 0.2s;">$50</button>
        <button class="tip-amount-btn" onclick="selectTip(100)" style="padding:12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface2);color:var(--text);font-weight:600;cursor:pointer;transition:all 0.2s;">$100</button>
        <button class="tip-amount-btn" onclick="selectTip('custom')" style="padding:12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface2);color:var(--text);font-weight:600;cursor:pointer;transition:all 0.2s;">Custom</button>
      </div>
      <div id="customTipWrap" style="display:none;margin-bottom:16px;">
        <input type="number" id="customTipAmount" placeholder="Enter amount" style="width:100%;padding:12px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);font-size:1rem;" />
      </div>
      <input type="text" id="tipMessage" placeholder="Add a message (optional)" maxlength="100" style="width:100%;padding:12px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);font-size:0.9rem;margin-bottom:16px;" />
      <button class="btn btn-brand btn-md btn-full" onclick="sendTip()" style="background:linear-gradient(135deg,var(--gold),#B8860B);border:none;"><i class="ti ti-gift"></i> Send Tip</button>
    </div>
  </div>
  
  <style>
    @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
    
    /* Improved container padding and spacing */
    .watch-layout { display:grid; grid-template-columns:1fr 380px; gap:24px; padding: 20px; }
    .main-player { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-xl); overflow:hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    .player-container { position:relative; background:#000; aspect-ratio:16/9; display:flex; align-items:center; justify-content:center; }
    .stream-info { padding:24px; }
    .stream-title { font-size:1.5rem; font-weight:700; margin:0 0 16px; line-height:1.3; }
    .stream-meta { display:flex; align-items:center; gap:16px; color:var(--text3); font-size:0.9rem; margin-bottom:20px; flex-wrap:wrap; }

    .action-btn { flex:1; padding:12px 16px; border-radius:var(--radius); border:1px solid var(--border2); background:var(--surface2); color:var(--text); cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; transition:all 0.3s; font-weight:500; }
    .action-btn:hover { background:var(--card2); border-color:var(--border3); transform: translateY(-1px); }
    .action-btn.primary { background:var(--grad-brand); border-color:transparent; color:white; }
    .action-btn.primary:hover { opacity:0.9; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(229,9,20,0.3); }
    
    /* Chat section improvements */
    .chat-section { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-xl); overflow:hidden; display:flex; flex-direction:column; height:calc(100vh - 180px); max-height:700px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    .chat-header { padding:18px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; background: var(--surface2); }
    .chat-header h3 { font-size:1rem; margin:0; display:flex; align-items:center; gap:8px; }

      .watch-layout { padding: 12px; gap: 16px; }
      .mobile-bottom-nav { display: flex !important; }
      .tip-fab { display: flex !important; }
      .chat-section { height: 380px; max-height: 380px; position: fixed; bottom: 70px; left: 12px; right: 12px; z-index: 100; border-radius: var(--radius-xl) var(--radius-xl) 0 0; box-shadow: 0 -4px 20px rgba(0,0,0,0.3); }
      .main-player { margin-bottom: 400px; }
      .stream-info { padding: 16px; }
      .stream-title { font-size: 1.2rem; }
      .page-wrap { padding-bottom: 140px; }
      .stream-actions { flex-wrap: wrap; gap: 8px; }
      .stream-actions .action-btn { flex: 1; min-width: 80px; padding: 10px; font-size: 0.85rem; }
    }
    
    .tip-amount-btn:hover, .tip-amount-btn.active { border-color: var(--gold); background: rgba(255,215,0,0.1); color: var(--gold); }
    .chat-message.tip-message { background: rgba(255,215,0,0.05); border-radius: var(--radius); padding: 8px 12px; border-left: 3px solid var(--gold); margin: 4px 0; }
    .chat-message.tip-message .chat-username { color: var(--gold); font-weight: 700; }
    
    /* Scrollbar styling */
    .chat-messages::-webkit-scrollbar { width: 6px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    .chat-messages::-webkit-scrollbar-thumb:hover { background: var(--border2); }
    .chat-messages { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
  </style>
  
  <!-- Socket.io -->
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script>
    let socket = null;
    
    function connectSocket(liveId) {
      // Connect to Socket.io server
      socket = io(window.location.origin, { 
        auth: { token: localStorage.getItem('token') },
        transports: ['websocket', 'polling']
      });
      
      socket.on('connect', () => {
        console.log('Connected to live chat');
        socket.emit('live:join', { liveId });
      });
      
      socket.on('live:message', (data) => {
        if (data.liveId === liveId) {
          addChatMessage(data.username, data.text, data.userId === socket.userId, data.isTip);
        }
      });
      
      socket.on('live:viewerUpdate', (data) => {
        if (data.liveId === liveId) {
          document.getElementById('viewerCount').querySelector('span').textContent = data.count;
          document.getElementById('chatUserCount').textContent = data.count + ' watching';
        }
      });
      
      socket.on('live:tip', (data) => {
        if (data.liveId === liveId) {
          addChatMessage(data.username, `Tipped $${data.amount}${data.message ? ': ' + data.message : ''}`, false, true);
          // Show tip animation
          showTipAnimation(data.amount);
        }
      });
      
      socket.on('disconnect', () => {
        console.log('Disconnected from live chat');
      });
    }
    
    function showTipAnimation(amount) {
      const toast = document.createElement('div');
      toast.style.cssText = 'position:fixed;top:20px;right:20px;background:linear-gradient(135deg,var(--gold),#B8860B);color:white;padding:16px 24px;border-radius:var(--radius-lg);z-index:9999;animation:slideInRight 0.5s ease-out;font-weight:600;box-shadow:0 4px 20px rgba(255,215,0,0.3);';
      toast.innerHTML = `<i class="ti ti-gift" style="margin-right:8px;"></i> Someone tipped $${amount}!`;
      document.body.appendChild(toast);
      setTimeout(() => {
        toast.style.animation = 'slideOutRight 0.5s ease-out';
        setTimeout(() => toast.remove(), 500);
      }, 3000);
    }
  </script>
  <style>
    @keyframes slideInRight { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes slideOutRight { from { transform: translateX(0); opacity: 1; } to { transform: translateX(100px); opacity: 0; } }
  </style>
  
  <script>
    // Mobile nav
    const path = window.location.pathname;
    document.querySelectorAll('.mobile-nav-item').forEach(item => {
      if (path.includes(item.getAttribute('href').replace('.html', ''))) item.classList.add('active');
      else item.classList.remove('active');
    });
    
    let selectedTipAmount = 0;
    function openTipModal() { 
      document.getElementById('tipModal').style.display = 'flex'; 
    }
    function closeTipModal() { 
      document.getElementById('tipModal').style.display = 'none'; 
      selectedTipAmount = 0;
      document.querySelectorAll('.tip-amount-btn').forEach(b => b.classList.remove('active'));
    }
    function selectTip(amount) {
      selectedTipAmount = amount;
      document.querySelectorAll('.tip-amount-btn').forEach(b => b.classList.remove('active'));
      if (amount === 'custom') {
        document.getElementById('customTipWrap').style.display = 'block';
        document.getElementById('customTipAmount').focus();
      } else {
        document.getElementById('customTipWrap').style.display = 'none';
        event.target.classList.add('active');
      }
    }
    function sendTip() {
      const amount = selectedTipAmount === 'custom' ? parseInt(document.getElementById('customTipAmount').value) : selectedTipAmount;
      if (!amount || amount < 1) return Toast.show('Please select a tip amount', 'warning');
      const msg = document.getElementById('tipMessage').value.trim();
      Toast.show(`Tip of $${amount} sent! ${msg ? 'Message: ' + msg : ''}`, 'success');
      closeTipModal();
      // Add tip message to chat
      addChatMessage('You', `Tipped $${amount}${msg ? ': ' + msg : ''}`, true, true);
    }

    // Best live enhancements from research (tip goals, polls, interactive)
    window.sendLiveTip = async function(amount) {
      if (!currentLive || !currentLive._id) return;
      const msg = prompt('Message with tip? (optional)');
      try {
        await api.post('/payments/tips', { creatorId: currentLive._id, amount, message: msg || 'Live tip' });
        addChatMessage('You', `Tipped $${amount}${msg ? ': ' + msg : ''}`, true, true);
        // Update goal progress (demo)
        const bar = document.getElementById('liveGoalBar');
        if (bar) bar.value = Math.min(200, parseInt(bar.value) + amount);
      } catch(e) {
        addChatMessage('You', `Tipped $${amount}`, true, true);
      }
    };

    window.startLivePoll = function() {
      if (!currentLive) return;
      const question = prompt('Poll question?');
      if (!question) return;
      const options = prompt('Options (comma separated)?', 'Yes,No,Maybe');
      if (!options) return;
      const pollData = { question, options: options.split(','), votes: {} };
      // Broadcast via socket
      if (socket) socket.emit('live:poll', { liveId: currentLive._id, poll: pollData });
      addSystemMessage('Poll started: ' + question);
    };
  </script>
</body>
