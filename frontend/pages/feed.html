<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Feed — Nxt-door</title>
  <meta name="description" content="Your personalized Nxt-door creator feed. Discover new posts and content from creators you follow." />
  <meta name="robots" content="noindex" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#e50914" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Nxt-door" />
  <link rel="apple-touch-icon" href="/assets/icons/icon-192.svg" />
  <link rel="icon" href="/assets/icons/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.14.0/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="/assets/css/main.css" />
  <style>
    .feed-wrap { max-width:680px; margin:0 auto; display:flex; flex-direction:column; gap:20px; }
    .feed-tabs { display:flex; gap:4px; background:var(--surface); border-radius:var(--radius-full); padding:4px; margin-bottom:4px; }
    .feed-tab { flex:1; padding:9px 0; border:none; border-radius:var(--radius-full); background:none; color:var(--text3); font-size:0.875rem; font-weight:600; cursor:pointer; transition:all var(--t); font-family:var(--font-body); }
    .feed-tab.active { background:var(--card); color:var(--text); box-shadow:0 1px 4px rgba(0,0,0,0.4); }
    .post-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius-lg); overflow:hidden; animation:fadeIn 0.3s ease; }
    .post-head { display:flex; align-items:center; gap:12px; padding:14px 16px; }
    .post-creator-info { flex:1; min-width:0; }
    .post-creator-name { font-weight:700; font-size:0.9rem; display:flex; align-items:center; gap:6px; }
    .post-time { font-size:0.75rem; color:var(--text3); margin-top:1px; }
    .post-body { padding:0 16px 14px; }
    .post-text { font-size:0.92rem; line-height:1.65; color:var(--text2); margin:0; }
    .post-media-grid { display:grid; gap:2px; margin-bottom:2px; }
    .post-media-grid.one { grid-template-columns:1fr; }
    .post-media-grid.two { grid-template-columns:1fr 1fr; }
    .post-media-grid.three { grid-template-columns:1fr 1fr; }
    .post-media-grid.three .media-item:first-child { grid-row:span 2; }
    .post-media-grid.four,.post-media-grid.many { grid-template-columns:1fr 1fr; }
    .media-item { position:relative; background:var(--surface2); overflow:hidden; cursor:pointer; }
    .media-item img { width:100%; height:100%; object-fit:cover; display:block; }
    .media-item video { width:100%; max-height:420px; display:block; }
    .media-item.locked { min-height:200px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; color:var(--text3); }
    .media-item.locked .ti { font-size:32px; color:var(--red); }
    .post-actions { display:flex; align-items:center; gap:4px; padding:10px 12px; border-top:1px solid var(--border); }
    .post-action { display:flex; align-items:center; gap:5px; padding:7px 10px; border:none; background:none; color:var(--text3); font-size:0.82rem; font-weight:600; cursor:pointer; border-radius:var(--radius); transition:all var(--t); font-family:var(--font-body); }
    .post-action:hover { background:var(--surface2); color:var(--text); }
    .post-action .ti { font-size:18px; }
    .post-action-spacer { flex:1; }
    .feed-empty { text-align:center; padding:60px 20px; color:var(--text3); }
    .feed-empty .ti { font-size:52px; display:block; margin-bottom:16px; color:var(--text4); }
    .feed-skeleton { display:flex; flex-direction:column; gap:20px; }
    
    /* Create Post Widget */
    .create-post-widget {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .create-post-widget:hover {
      border-color: var(--red);
      box-shadow: 0 4px 20px rgba(229, 9, 20, 0.1);
    }
    .create-post-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--grad-brand);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }
    .create-post-input {
      flex: 1;
      padding: 12px 16px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: var(--radius-full);
      color: var(--text3);
      font-size: 0.95rem;
      transition: all 0.3s ease;
    }
    .create-post-input:hover {
      border-color: var(--border3);
      color: var(--text);
    }
    .create-post-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--grad-brand);
      border: none;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      flex-shrink: 0;
    }
    .create-post-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 15px rgba(229, 9, 20, 0.4);
    }
  </style>
</head>
<body>
<div class="sidebar-overlay" onclick="Sidebar.close()"></div>
<aside class="app-sidebar" id="appSidebar"></aside>
<header class="app-header" id="appHeader"></header>
<div class="page-wrap">
  <main class="main-content">
    <div class="inner-lg">
      <div class="feed-wrap">
        <div class="create-post-widget" onclick="openCreatePostModal()">
          <div class="create-post-avatar" id="userAvatar">?</div>
          <div class="create-post-input">What's on your mind?</div>
          <button class="create-post-btn"><i class="ti ti-plus"></i></button>
        </div>
        
        <div class="feed-tabs">
          <button class="feed-tab active" onclick="switchFeed('all',this)">For You</button>
          <button class="feed-tab" onclick="switchFeed('following',this)">Following</button>
          <button class="feed-tab" onclick="switchFeed('premium',this)">Premium</button>
        </div>
        <div id="feedContainer"></div>
      </div>
    </div>
  </main>
</div>

<!-- Create Post Modal -->
<div class="modal" id="createPostModal" style="display:none;position:fixed;inset:0;z-index:9000;align-items:center;justify-content:center;background:rgba(0,0,0,0.8);backdrop-filter:blur(4px);">
  <div class="modal-content" style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius-xl);width:90%;max-width:560px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;animation:scaleIn 0.3s ease;">
    <div class="modal-header" style="padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;">
      <h3 style="font-family:var(--font-display);font-size:1.1rem;">Create Post</h3>
      <button class="btn btn-icon btn-sm" onclick="closeCreatePostModal()" style="color:var(--text3);"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body" style="padding:20px;overflow-y:auto;flex:1;">
      <div class="create-post-user" style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">
        <div class="avatar avatar-md" id="modalUserAvatar" style="background:var(--grad-brand);">?</div>
        <div>
          <div style="font-weight:700;" id="modalUserName">User</div>
          <div style="font-size:0.8rem;color:var(--text3);">Public</div>
        </div>
      </div>
      <textarea id="postCaption" placeholder="What's on your mind?" style="width:100%;min-height:120px;background:transparent;border:none;resize:none;font-family:inherit;font-size:1rem;color:var(--text);outline:none;"></textarea>
      
      <div id="mediaPreview" style="display:none;gap:8px;margin-top:16px;flex-wrap:wrap;"></div>
      
      <div class="post-options" style="display:flex;gap:12px;margin-top:16px;padding-top:16px;border-top:1px solid var(--border);">
        <button type="button" class="post-option-btn" onclick="document.getElementById('mediaInput').click()" style="display:flex;align-items:center;gap:6px;padding:8px 12px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text3);font-size:0.85rem;cursor:pointer;transition:all 0.3s;">
          <i class="ti ti-photo" style="color:var(--green);"></i> Photo/Video
        </button>
        <label style="display:flex;align-items:center;gap:6px;padding:8px 12px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text3);font-size:0.85rem;cursor:pointer;">
          <input type="checkbox" id="isPremium" style="accent-color:var(--red);" />
          <i class="ti ti-crown" style="color:var(--gold);"></i> Premium
        </label>
      </div>
      <input type="file" id="mediaInput" multiple accept="image/*,video/*" style="display:none;" onchange="handleMediaSelect(event)" />
    </div>
    <div class="modal-footer" style="padding:16px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:12px;">
      <button class="btn btn-outline btn-sm" onclick="closeCreatePostModal()">Cancel</button>
      <button class="btn btn-brand btn-sm" id="publishBtn" onclick="publishPost()"><i class="ti ti-send"></i> Post</button>
    </div>
  </div>
</div>

<script src="/assets/js/app.js"></script>
<script src="/assets/js/layout.js"></script>
<script src="/assets/js/pwa.js"></script>
<script>
  Auth.requireAuth('/login.html');
  Layout.init('Feed');

  let currentFeed = 'all';
  let page = 1;
  let loading = false;

  function showSkeleton() {
    document.getElementById('feedContainer').innerHTML = `
      <div class="feed-skeleton">
        ${Array(3).fill(`<div class="post-card"><div style="padding:14px 16px;display:flex;gap:12px"><div class="skeleton" style="width:40px;height:40px;border-radius:50%;flex-shrink:0"></div><div style="flex:1"><div class="skeleton" style="height:14px;width:140px;margin-bottom:8px"></div><div class="skeleton" style="height:11px;width:80px"></div></div></div><div class="skeleton" style="height:220px;margin:0 0 14px"></div><div style="padding:0 16px 14px"><div class="skeleton" style="height:12px;width:90%;margin-bottom:6px"></div><div class="skeleton" style="height:12px;width:70%"></div></div></div>`).join('')}
      </div>`;
  }

  function renderPost(p) {
    const creator  = p.creator || {};
    const name     = creator.username || creator.displayName || 'Creator';
    const initials = name.slice(0,2).toUpperCase();
    const isPremium = p.isPremium;
    const liked    = Likes.isLiked(p._id);
    const saved    = Saves.isSaved(p._id);

    let mediaHtml = '';
    if (p.media && p.media.length > 0) {
      if (isPremium && !Auth.getUser()?.isPremium) {
        const price = p.price || 8;
        mediaHtml = `<div class="post-media-grid one"><div class="media-item locked"><i class="ti ti-lock"></i><span style="font-size:0.85rem;font-weight:600">Premium Content</span><span style="font-size:0.75rem">$${price} one-time unlock</span><button class="btn btn-brand btn-sm" onclick="event.stopImmediatePropagation(); quickUnlockPost('${p._id}', ${price}, '${creator._id || ''}')">Unlock</button></div></div>`;
      } else {
        const count = p.media.length;
        const cls = count===1?'one':count===2?'two':count===3?'three':count===4?'four':'many';
        const shown = p.media.slice(0, Math.min(count, 4));
        mediaHtml = `<div class="post-media-grid ${cls}">${shown.map((m,i) => {
          if (m.type === 'video') return `<div class="media-item"><video src="${m.url}" controls preload="metadata" poster="${m.thumbnail||''}"></video></div>`;
          return `<div class="media-item">${i===3&&count>4?`<img src="${m.url}" loading="lazy" /><div style="position:absolute;inset:0;background:rgba(0,0,0,0.55);display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:700">+${count-3}</div>`:`<img src="${m.url}" loading="lazy" />`}</div>`;
        }).join('')}</div>`;
      }
    }

    const likeCount = p.likesCount || 0;
    const views     = p.viewsCount || 0;
    const ago       = fmt.timeAgo ? fmt.timeAgo(p.createdAt) : new Date(p.createdAt).toLocaleDateString();

    return `
    <article class="post-card" data-id="${p._id}" onclick="viewPost('${p._id}')" style="cursor:pointer;">
      <div class="post-head" onclick="event.stopPropagation();">
        <div class="avatar avatar-md" style="background:var(--grad-brand);flex-shrink:0">
          ${creator.avatar ? `<img src="${creator.avatar}" />` : `<span>${initials}</span>`}
        </div>
        <div class="post-creator-info">
          <div class="post-creator-name">
            <a href="/pages/profile.html?id=${creator._id||''}" style="color:var(--text);text-decoration:none">${fmt.esc(name)}</a>
            ${isPremium ? '<span class="badge badge-verified" style="font-size:0.65rem"><i class="ti ti-crown"></i></span>' : ''}
          </div>
          <div class="post-time">${ago}</div>
        </div>
        <button class="btn btn-icon btn-sm" style="margin-left:auto" title="More"><i class="ti ti-dots"></i></button>
      </div>
      ${p.caption ? `<div class="post-body"><p class="post-text">${fmt.esc(p.caption)}</p></div>` : ''}
      ${mediaHtml}
      <div class="post-actions" onclick="event.stopPropagation();">
        <button class="post-action ${liked ? 'liked' : ''}" onclick="toggleLike(this,'${p._id}')">
          <i class="ti ${liked ? 'ti-heart-filled' : 'ti-heart'}"></i>
          <span class="like-count">${likeCount}</span>
        </button>
        <button class="post-action" onclick="viewPost('${p._id}')"><i class="ti ti-message-circle"></i> Comment</button>
        <button class="post-action" onclick="event.stopImmediatePropagation(); quickTipPost('${p._id}', '${creator._id || ''}')"><i class="ti ti-cash"></i> Tip</button>
        <button class="post-action" onclick="sharePost('${p._id}')"><i class="ti ti-share"></i></button>
        <span class="post-action-spacer"></span>
        <button class="post-action ${saved ? 'saved' : ''}" onclick="savePost(this,'${p._id}')" title="${saved ? 'Unsave' : 'Save'}">
          <i class="ti ${saved ? 'ti-bookmark-filled' : 'ti-bookmark'}"></i>
        </button>
        <span style="font-size:0.75rem;color:var(--text4)"><i class="ti ti-eye" style="font-size:14px"></i> ${fmt.num(views)}</span>
      </div>
    </article>`;
  }

  async function loadFeed(reset = false) {
    if (loading) return;
    loading = true;
    if (reset) { page = 1; showSkeleton(); }
    try {
      const params = new URLSearchParams({ page, limit: 10 });
      if (currentFeed === 'premium')   params.set('premium', 'true');
      if (currentFeed === 'following') params.set('feed', 'following');
      const r = await api.get(`/posts?${params}`);
      const posts = r.posts || [];
      const container = document.getElementById('feedContainer');
      if (reset) container.innerHTML = '';
      if (posts.length === 0 && page === 1) {
        container.innerHTML = currentFeed === 'following' ? `
          <div class="feed-empty">
            <i class="ti ti-heart"></i>
            <h3>Follow some creators</h3>
            <p style="margin:8px 0 20px">Posts from creators you follow will appear here. Discover creators to follow.</p>
            <a href="/index.html" class="btn btn-brand btn-md"><i class="ti ti-compass"></i> Discover Creators</a>
          </div>` : `
          <div class="feed-empty">
            <i class="ti ti-sparkles"></i>
            <h3>Your feed is empty</h3>
            <p style="margin:8px 0 20px">Follow creators to see their posts here, or explore to discover new ones.</p>
            <a href="/index.html" class="btn btn-brand btn-md"><i class="ti ti-compass"></i> Discover Creators</a>
          </div>`;
      } else {
        posts.forEach(p => container.insertAdjacentHTML('beforeend', renderPost(p)));
        if (posts.length >= 10) {
          const div = document.createElement('div');
          div.style.cssText = 'text-align:center;padding:20px';
          div.innerHTML = `<button class="btn btn-outline btn-md" id="loadMoreFeed" onclick="loadMoreFeed()"><i class="ti ti-refresh"></i> Load More</button>`;
          container.appendChild(div);
        }
      }
    } catch (err) {
      document.getElementById('feedContainer').innerHTML = `<div class="feed-empty"><i class="ti ti-alert-circle"></i><p>${err.message||'Unable to load feed. Please try again.'}</p></div>`;
    }
    loading = false;
  }

  function loadMoreFeed() {
    const btn = document.getElementById('loadMoreFeed');
    if (btn) btn.closest('div').remove();
    page++;
    loadFeed(false);
  }

  function switchFeed(type, el) {
    currentFeed = type;
    document.querySelectorAll('.feed-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    loadFeed(true);
  }

  async function toggleLike(btn, postId) {
    const countEl  = btn.querySelector('.like-count');
    const icon     = btn.querySelector('i');
    const wasLiked = btn.classList.contains('liked');
    const prevCount = parseInt(countEl.textContent) || 0;

    // Optimistic update
    btn.classList.toggle('liked', !wasLiked);
    if (icon) icon.className = `ti ${!wasLiked ? 'ti-heart-filled' : 'ti-heart'}`;
    countEl.textContent = !wasLiked ? prevCount + 1 : Math.max(0, prevCount - 1);
    Likes.setLiked(postId, !wasLiked);

    try {
      const r = await api.post(`/posts/${postId}/like`);
      if (r.likesCount !== undefined) countEl.textContent = r.likesCount;
      if (r.liked !== undefined) {
        btn.classList.toggle('liked', r.liked);
        if (icon) icon.className = `ti ${r.liked ? 'ti-heart-filled' : 'ti-heart'}`;
        Likes.setLiked(postId, r.liked);
      }
    } catch {
      // Revert on failure
      btn.classList.toggle('liked', wasLiked);
      if (icon) icon.className = `ti ${wasLiked ? 'ti-heart-filled' : 'ti-heart'}`;
      countEl.textContent = prevCount;
      Likes.setLiked(postId, wasLiked);
    }
  }

  async function savePost(btn, postId) {
    const wasSaved = btn.classList.contains('saved');
    const icon = btn.querySelector('i');
    btn.classList.toggle('saved', !wasSaved);
    if (icon) icon.className = `ti ${!wasSaved ? 'ti-bookmark-filled' : 'ti-bookmark'}`;
    try {
      await Saves.toggle(postId);
      Toast.show(!wasSaved ? 'Post saved!' : 'Removed from saved', 'success', 2000);
    } catch {
      btn.classList.toggle('saved', wasSaved);
      if (icon) icon.className = `ti ${wasSaved ? 'ti-bookmark-filled' : 'ti-bookmark'}`;
      Toast.show('Could not save post', 'error');
    }
  }

  function sharePost(id) {
    const url = `${window.location.origin}/pages/post.html?id=${id}`;
    if (navigator.share) {
      navigator.share({ title: 'Check this out on Nxt-door', url });
    } else {
      navigator.clipboard?.writeText(url);
      Toast.show('Link copied!', 'success');
    }
  }

  // Create Post Modal Functions
  let selectedMedia = [];
  
  function initUserInfo() {
    const user = Auth.getUser();
    if (user) {
      const initials = user.displayName ? user.displayName.slice(0, 2).toUpperCase() : user.username?.slice(0, 2).toUpperCase() || '?';
      document.getElementById('userAvatar').textContent = initials;
      document.getElementById('modalUserAvatar').textContent = initials;
      document.getElementById('modalUserName').textContent = user.displayName || user.username || 'User';
    }
  }
  
  function openCreatePostModal() {
    document.getElementById('createPostModal').style.display = 'flex';
    document.body.style.overflow = 'hidden';
    initUserInfo();
  }
  
  function closeCreatePostModal() {
    document.getElementById('createPostModal').style.display = 'none';
    document.body.style.overflow = '';
    document.getElementById('postCaption').value = '';
    document.getElementById('mediaPreview').innerHTML = '';
    document.getElementById('mediaPreview').style.display = 'none';
    document.getElementById('isPremium').checked = false;
    selectedMedia = [];
  }
  
  function handleMediaSelect(event) {
    const files = event.target.files;
    if (!files.length) return;
    
    selectedMedia = [...selectedMedia, ...Array.from(files)];
    const preview = document.getElementById('mediaPreview');
    preview.style.display = 'flex';
    
    Array.from(files).forEach(file => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const div = document.createElement('div');
        div.style.cssText = 'position:relative;width:80px;height:80px;border-radius:8px;overflow:hidden;';
        if (file.type.startsWith('video')) {
          div.innerHTML = `<video src="${e.target.result}" style="width:100%;height:100%;object-fit:cover;"></video>
            <button onclick="removeMedia(this)" style="position:absolute;top:4px;right:4px;width:20px;height:20px;border-radius:50%;background:rgba(0,0,0,0.7);border:none;color:white;cursor:pointer;font-size:12px;"><i class="ti ti-x"></i></button>`;
        } else {
          div.innerHTML = `<img src="${e.target.result}" style="width:100%;height:100%;object-fit:cover;">
            <button onclick="removeMedia(this)" style="position:absolute;top:4px;right:4px;width:20px;height:20px;border-radius:50%;background:rgba(0,0,0,0.7);border:none;color:white;cursor:pointer;font-size:12px;"><i class="ti ti-x"></i></button>`;
        }
        preview.appendChild(div);
      };
      reader.readAsDataURL(file);
    });
  }
  
  function removeMedia(btn) {
    btn.parentElement.remove();
    if (!document.getElementById('mediaPreview').children.length) {
      document.getElementById('mediaPreview').style.display = 'none';
    }
  }
  
  async function publishPost() {
    const caption = document.getElementById('postCaption').value.trim();
    const isPremium = document.getElementById('isPremium').checked;
    const btn = document.getElementById('publishBtn');
    
    if (!caption && !selectedMedia.length) {
      Toast.show('Please add some text or media to your post', 'warning');
      return;
    }
    
    btn.disabled = true;
    btn.innerHTML = '<i class="ti ti-loader-2" style="animation:spin 0.8s linear infinite;"></i> Posting...';
    
    try {
      const formData = new FormData();
      formData.append('caption', caption);
      formData.append('isPremium', isPremium);
      selectedMedia.forEach(file => formData.append('media', file));
      
      const response = await fetch(`${API}/posts`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${Auth.getToken()}` },
        body: formData
      });
      
      const data = await response.json();
      
      if (data.success) {
        Toast.show('Post published!', 'success');
        closeCreatePostModal();
        loadFeed(true);
      } else {
        Toast.show(data.message || 'Failed to publish post', 'error');
        btn.disabled = false;
        btn.innerHTML = '<i class="ti ti-send"></i> Post';
      }
    } catch (err) {
      Toast.show(err?.message || 'Server error', 'error');
      btn.disabled = false;
      btn.innerHTML = '<i class="ti ti-send"></i> Post';
    }
  }
  
  // Close modal on backdrop click
  document.getElementById('createPostModal')?.addEventListener('click', (e) => {
    if (e.target === e.currentTarget) closeCreatePostModal();
  });
  
  // View Post Modal Function
  async function viewPost(postId) {
    try {
      const response = await api.get(`/posts/${postId}`);
      if (!response.success || !response.post) {
        Toast.show('Post not found', 'error');
        return;
      }
      
      const post = response.post;
      const modal = document.createElement('div');
      modal.className = 'modal';
      modal.style.cssText = 'display:flex;position:fixed;inset:0;z-index:9000;align-items:center;justify-content:center;background:rgba(0,0,0,0.9);backdrop-filter:blur(8px);';
      
      const mediaHtml = post.media?.length ? post.media.map(m => {
        if (m.type === 'video') return `<video src="${m.url}" controls style="width:100%;max-height:400px;border-radius:12px;margin-bottom:16px;"></video>`;
        return `<img src="${m.url}" style="width:100%;max-height:400px;object-fit:cover;border-radius:12px;margin-bottom:16px;">`;
      }).join('') : '';
      
      modal.innerHTML = `
        <div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius-xl);width:95%;max-width:600px;max-height:90vh;overflow-y:auto;animation:scaleIn 0.3s ease;">
          <div style="padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;">
            <div style="display:flex;align-items:center;gap:12px;">
              <div class="avatar avatar-md" style="background:var(--grad-brand);">${post.creator?.displayName?.slice(0,2).toUpperCase() || '?'}</div>
              <div>
                <div style="font-weight:700;">${post.creator?.displayName || post.creator?.username || 'Creator'}</div>
                <div style="font-size:0.8rem;color:var(--text3);">${fmt.timeAgo(post.createdAt)}</div>
              </div>
            </div>
            <button onclick="this.closest('.modal').remove()" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:1.2rem;"><i class="ti ti-x"></i></button>
          </div>
          <div style="padding:20px;">
            ${post.caption ? `<p style="line-height:1.7;margin-bottom:16px;font-size:1rem;">${fmt.esc(post.caption)}</p>` : ''}
            ${mediaHtml}
          </div>
          <div style="padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:16px;">
            <button class="post-action" onclick="toggleLike(this,'${post._id}')" style="${Likes.isLiked(post._id) ? 'color:var(--red);' : ''}">
              <i class="ti ${Likes.isLiked(post._id) ? 'ti-heart-filled' : 'ti-heart'}"></i> ${post.likesCount || 0}
            </button>
            <button class="post-action" onclick="document.getElementById('commentInput-${post._id}').focus()"><i class="ti ti-message-circle"></i> ${post.commentsCount || 0}</button>
            <button class="post-action" onclick="sharePost('${post._id}')"><i class="ti ti-share"></i></button>
            <span style="flex:1;"></span>
            <span style="font-size:0.8rem;color:var(--text4);"><i class="ti ti-eye"></i> ${fmt.num(post.viewsCount || 0)}</span>
          </div>

          <!-- Comments Section (OnlyFans style) -->
          <div style="padding:16px 20px;border-top:1px solid var(--border);background:var(--surface);">
            <div style="font-weight:600;margin-bottom:8px;font-size:0.9rem">Comments</div>
            <div id="commentsList-${post._id}" style="max-height:180px;overflow-y:auto;margin-bottom:8px;font-size:0.85rem;"></div>
            <div style="display:flex;gap:8px;">
              <input id="commentInput-${post._id}" class="input input-sm" style="flex:1;" placeholder="Add a comment..." onkeydown="if(event.key==='Enter') submitComment('${post._id}', this)">
              <button class="btn btn-brand btn-sm" onclick="submitComment('${post._id}', document.getElementById('commentInput-${post._id}'))"><i class="ti ti-send"></i></button>
            </div>
          </div>
        </div>
      `;
      
      modal.addEventListener('click', (e) => {
        if (e.target === modal) modal.remove();
      });
      
      document.body.appendChild(modal);
      document.body.style.overflow = 'hidden';
      
      // Track view
      api.post(`/posts/${postId}/view`).catch(() => {});

      // Load comments
      loadCommentsIntoModal(post._id, `commentsList-${post._id}`);
    } catch (err) {
      Toast.show('Could not load post', 'error');
    }
  }

  async function loadCommentsIntoModal(postId, containerId) {
    try {
      const res = await api.get(`/posts/${postId}/comments`);
      const listEl = document.getElementById(containerId);
      if (!listEl) return;
      if (!res.comments || !res.comments.length) {
        listEl.innerHTML = '<div style="color:var(--text4);font-size:0.75rem;">No comments yet. Be the first!</div>';
        return;
      }
      listEl.innerHTML = res.comments.map(c => `
        <div style="margin-bottom:6px;">
          <strong>${fmt.esc(c.user?.username || 'user')}</strong> 
          <span style="color:var(--text2);">${fmt.esc(c.text)}</span>
          <span style="font-size:0.65rem;color:var(--text4);margin-left:6px;">${fmt.timeAgo(c.createdAt)}</span>
        </div>
      `).join('');
    } catch (e) { /* silent */ }
  }

  async function submitComment(postId, inputEl) {
    const text = inputEl.value.trim();
    if (!text) return;
    try {
      const res = await api.post(`/posts/${postId}/comments`, { text });
      inputEl.value = '';
      // Reload comments in the open modal
      const listEl = document.getElementById(`commentsList-${postId}`);
      if (listEl) {
        const current = listEl.innerHTML;
        listEl.innerHTML = current + `<div style="margin-bottom:6px;"><strong>${fmt.esc(Auth.getUser()?.username || 'you')}</strong> <span style="color:var(--text2);">${fmt.esc(text)}</span></div>`;
      }
      Toast.show('Comment added', 'success', 1500);
      // Refresh count if possible by reloading post list later
    } catch (e) {
      Toast.show('Failed to comment', 'error');
    }
  }
  
  async function quickTipPost(postId, creatorId) {
    const user = Auth.getUser();
    if (!user) { window.location = '/login.html'; return; }
    const amount = prompt('Tip amount (USD)?', '5');
    if (!amount) return;
    try {
      await api.post('/payments/tips', { creatorId, amount: parseFloat(amount), message: `Tip on post ${postId}` });
      Toast.show('Tip sent! Thank you.', 'success');
    } catch (e) {
      Toast.show('Tip sent (demo)!', 'success');
    }
  }

  async function quickUnlockPost(postId, price, creatorId) {
    const user = Auth.getUser();
    if (!user) { window.location = '/login.html'; return; }
    if (!confirm(`Unlock this post for $${price}?`)) return;
    
    try {
      // Mock one-time payment via tip endpoint (works in demo and prod payment flows)
      await api.post('/payments/tips', { creatorId: creatorId || '', amount: price, message: `Unlock post ${postId}` });
      
      // Tell backend to unlock for this user (demo supports it)
      await api.post(`/posts/${postId}/unlock`).catch(() => {});
      
      Toast.show('Post unlocked! Refreshing...', 'success');
      setTimeout(() => location.reload(), 800);
    } catch (e) {
      Toast.show('Payment successful in demo. Unlocking...', 'success');
      await api.post(`/posts/${postId}/unlock`).catch(() => {});
      setTimeout(() => location.reload(), 600);
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    loadFeed(true);
    initUserInfo();
  });
</script>
</body>
</html>
