<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Trending — Nxt-door</title>
  <meta name="description" content="Discover trending creator content on Nxt-door. Find the hottest creators and videos on Africa's premier platform right now." />
  <meta name="robots" content="index, follow" />
  <meta property="og:site_name" content="Nxt-door" />
  <meta property="og:title" content="Trending — Nxt-door" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#e50914" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Nxt-door" />
  <link rel="apple-touch-icon" href="/assets/icons/icon-192.svg" />
  <link rel="icon" href="/assets/icons/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.14.0/dist/tabler-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/main.css" />
  <style>
    .trending-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px}
    .video-card{cursor:pointer;display:flex;flex-direction:column;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;transition:transform var(--t),box-shadow var(--t)}
    .video-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
    .video-thumb{position:relative;height:200px;background:linear-gradient(135deg,rgba(16,24,40,0.9),rgba(15,23,42,0.7));display:flex;align-items:flex-end;padding:14px}
    .video-thumb::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent,rgba(0,0,0,0.5))}
    .video-thumb-content{position:relative;z-index:1;width:100%}
    .video-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,0.12);backdrop-filter:blur(8px);color:#fff;padding:5px 10px;border-radius:999px;font-size:0.72rem;font-weight:700}
    .video-meta{padding:14px 16px;display:flex;flex-direction:column;gap:8px}
    .video-title{font-size:0.92rem;font-weight:700;line-height:1.35;color:var(--text)}
    .video-subtitle{font-size:0.78rem;color:var(--text3)}
    .video-stats{display:flex;flex-wrap:wrap;gap:10px;color:var(--text4);font-size:0.76rem}
    .empty-state{display:flex;flex-direction:column;min-height:240px;align-items:center;justify-content:center;gap:12px;color:var(--text3);text-align:center;grid-column:1/-1}
    .empty-state .ti{font-size:48px;color:var(--text4)}
  </style>
</head>
<body>
  <div class="sidebar-overlay" onclick="Sidebar.close()"></div>
  <aside class="app-sidebar" id="appSidebar"></aside>
  <header class="app-header" id="appHeader"></header>
  <div class="page-wrap">
    <main class="main-content">
      <div class="inner-lg">
        <div style="margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap">
          <div>
            <div class="label">What's Hot</div>
            <h1 style="margin:4px 0 0">Trending</h1>
            <p style="margin:6px 0 0;color:var(--text3)">Real-time trending content on Nxt-door. Find the hottest creators and videos right now.</p>
          </div>
          <button class="btn btn-brand btn-md" onclick="window.location.href='/pages/search.html'"><i class="ti ti-search"></i> Search Content</button>
        </div>
        <div id="trendingGrid" class="trending-grid"></div>
      </div>
    </main>
  </div>
  <script src="/assets/js/app.js"></script>
  <script src="/assets/js/layout.js"></script>
  <script src="/assets/js/pwa.js"></script>
  <script>
    Layout.init('Trending');

    function renderVideoCard(v) {
      const uploader = v.uploader?.username||'Creator';
      const views = fmt.num ? fmt.num(v.views||0) : (v.views||0);
      return `
        <div class="video-card" onclick="window.location='/pages/live-watch.html?id=${v._id}'">
          <div class="video-thumb">
            <div class="video-thumb-content">
              <div class="video-badge"><i class="ti ti-trending-up"></i> Trending</div>
              <div style="margin-top:8px;font-size:0.85rem;font-weight:600;color:#fff">${fmt.esc(uploader)}</div>
            </div>
          </div>
          <div class="video-meta">
            <div class="video-title">${fmt.esc(v.title||'Untitled Video')}</div>
            <div class="video-subtitle">${fmt.esc(v.category||'Creator Video')}</div>
            <div class="video-stats">
              <span><i class="ti ti-eye"></i> ${views} views</span>
              ${v.duration?`<span><i class="ti ti-clock"></i> ${v.duration}</span>`:''}
            </div>
          </div>
        </div>`;
    }

    async function loadTrending() {
      const grid = document.getElementById('trendingGrid');
      grid.innerHTML = Array(6).fill(`<div class="video-card skeleton" style="height:280px"></div>`).join('');
      try {
        const r = await api.get('/videos?limit=24');
        const videos = (r.videos||[]).slice().sort((a,b)=>(b.views||0)-(a.views||0));
        if (!videos.length) {
          grid.innerHTML = `<div class="empty-state"><i class="ti ti-trending-up"></i><p style="font-size:0.95rem;font-weight:600">No trending content yet</p><p style="font-size:0.82rem">Check back soon or <a href="/pages/search.html" style="color:var(--red)">search for creators</a>.</p></div>`;
          return;
        }
        grid.innerHTML = videos.map(renderVideoCard).join('');
      } catch {
        grid.innerHTML = `<div class="empty-state"><i class="ti ti-alert-circle"></i><p>Unable to load trending content.</p></div>`;
      }
    }

    loadTrending();
  </script>
</body>
</html>
