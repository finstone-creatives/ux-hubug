<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live — UX-HUB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.14.0/dist/tabler-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/main.css" />
  <style>
    .live-grid { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:20px; }
    .live-card { background:var(--surface); border:1px solid var(--border); border-radius:1rem; overflow:hidden; cursor:pointer; transition:transform var(--t),box-shadow var(--t); }
    .live-card:hover { transform:translateY(-4px); box-shadow:var(--shadow); }
    .live-cover { position:relative; min-height:190px; background:linear-gradient(180deg,rgba(15,23,42,0.3),rgba(15,23,42,0.8)); display:flex; align-items:flex-end; padding:16px; color:#fff; }
    .live-cover::after { content:''; position:absolute; inset:0; background:linear-gradient(180deg,transparent,rgba(0,0,0,0.45)); }
    .live-cover-content { position:relative; z-index:1; width:100%; }
    .live-badge { display:inline-flex; align-items:center; gap:6px; background:var(--red); color:#fff; padding:6px 10px; border-radius:999px; font-size:0.75rem; }
    .live-info { padding:16px; display:flex; flex-direction:column; gap:8px; }
    .live-title { font-size:1rem; font-weight:700; color:var(--text); }
    .live-meta { display:flex; flex-wrap:wrap; gap:12px; color:var(--text3); font-size:0.82rem; }
    .empty-state { display:none; min-height:240px; align-items:center; justify-content:center; gap:12px; color:var(--text3); text-align:center; }
    .empty-state .ti { font-size:42px; color:var(--text2); }
    .page-header { margin-bottom:24px; display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; }
    .page-header h1 { margin:0; font-size:2rem; }
    .page-header p { margin:0; color:var(--text3); max-width:620px; }
    @media(max-width:1024px){ .live-grid { grid-template-columns: repeat(2,minmax(0,1fr)); } }
    @media(max-width:720px){ .live-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="sidebar-overlay" onclick="Sidebar.close()"></div>
  <aside class="app-sidebar" id="appSidebar"></aside>
  <header class="app-header" id="appHeader"></header>
  <div class="page-wrap">
    <main class="main-content">
      <div class="inner-lg">
        <div class="page-header">
          <div>
            <h1>Live Now</h1>
            <p>Explore active streams and discover creators who are live in real time. Stay tuned to the hottest sessions.</p>
          </div>
          <button class="btn btn-brand btn-md" onclick="window.location.href='/pages/search.html'">Search Live</button>
        </div>
        <div id="liveGrid" class="live-grid"></div>
        <div id="liveState" class="empty-state">
          <i class="ti ti-alert-circle"></i>
          <p>No active live streams are available right now. Try refreshing or visit Trending for recently popular content.</p>
        </div>
      </div>
    </main>
  </div>
  <script src="/assets/js/app.js"></script>
  <script src="/assets/js/layout.js"></script>
  <script>
    Layout.init('Live Now');

    function renderLiveCard(video) {
      const title = video.title || 'Live session';
      const creator = video.uploader?.username || 'Creator';
      const viewers = video.views ? `${Math.max(1, Math.floor(video.views / 10))} viewers` : 'Live';
      return `
        <div class="live-card" onclick="window.location='/pages/live-watch.html?id=${video._id}'">
          <div class="live-cover">
            <div class="live-cover-content">
              <div class="live-badge"><i class="ti ti-player-play-filled"></i> LIVE</div>
              <div style="margin-top:12px;font-size:1rem;font-weight:700">${title.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
            </div>
          </div>
          <div class="live-info">
            <div class="live-title">${creator}</div>
            <div class="live-meta"><span><i class="ti ti-eye"></i> ${viewers}</span><span>${video.category || 'Creative'}</span></div>
          </div>
        </div>`;
    }

    async function loadLive() {
      const state = document.getElementById('liveState');
      const grid = document.getElementById('liveGrid');
      state.style.display = 'none';
      grid.innerHTML = '';
      try {
        const response = await api.get('/videos?limit=24');
        const videos = (response.videos || []).filter(video => {
          const text = `${video.title || ''} ${video.category || ''} ${video.tags?.join(' ') || ''}`.toLowerCase();
          return text.includes('live') || text.includes('stream') || text.includes('show');
        });
        const results = videos.length ? videos : (response.videos || []).slice(0, 12);
        if (!results.length) {
          state.style.display = 'flex';
          return;
        }
        grid.innerHTML = results.map(renderLiveCard).join('');
      } catch (err) {
        state.style.display = 'flex';
      }
    }

    loadLive();
  </script>
</body>
</html>
