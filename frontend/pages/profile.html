<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Creator Profile — UX-HUB</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.14.0/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="/assets/css/main.css">
  <style>
    .profile-cover{width:100%;height:280px;background:linear-gradient(135deg,#2D1B69,#1A2D1A);background-size:cover;background-position:center;position:relative}
    .profile-cover-actions{position:absolute;top:16px;right:16px;display:flex;gap:8px}
    .profile-header{max-width:900px;margin:0 auto;padding:0 24px}
    .profile-avatar-row{display:flex;justify-content:space-between;align-items:flex-end;margin-top:-54px;margin-bottom:16px;flex-wrap:wrap;gap:16px}
    .profile-avatar{width:108px;height:108px;border-radius:50%;border:4px solid var(--bg);background:var(--gradient);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:2.2rem;font-weight:700;color:#fff;overflow:hidden;flex-shrink:0}
    .profile-avatar img{width:100%;height:100%;object-fit:cover}
    .profile-actions{display:flex;gap:10px;flex-wrap:wrap;padding-bottom:4px}
    .profile-name{font-size:1.6rem;font-weight:800;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .profile-handle{color:var(--text3);font-size:0.9rem;margin-top:2px}
    .profile-bio{color:var(--text2);font-size:0.92rem;line-height:1.7;margin:12px 0;max-width:600px}
    .profile-meta{display:flex;gap:20px;flex-wrap:wrap;margin:12px 0}
    .profile-meta-item{display:flex;align-items:center;gap:6px;font-size:0.82rem;color:var(--text3)}
    .profile-meta-item .ti{font-size:15px}
    .profile-stats{display:flex;gap:24px;margin:16px 0;flex-wrap:wrap}
    .profile-stat{text-align:center}
    .profile-stat strong{display:block;font-family:var(--font-display);font-size:1.4rem;font-weight:700}
    .profile-stat span{font-size:0.75rem;color:var(--text3)}
    .profile-tabs-wrap{border-bottom:1px solid var(--border);margin-top:20px}
    .profile-body{max-width:900px;margin:0 auto;padding:24px}
    .sub-tier-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;transition:all var(--t)}
    .sub-tier-card:hover{border-color:var(--brand);transform:translateY(-2px)}
    .sub-tier-card.recommended{border-color:var(--brand);background:radial-gradient(ellipse at top,var(--brand-light),transparent)}
    .tier-price{font-family:var(--font-display);font-size:2.2rem;font-weight:700;color:var(--brand)}
    .tier-period{font-size:0.82rem;color:var(--text3)}
    .tier-features{display:flex;flex-direction:column;gap:8px;margin:16px 0}
    .tier-feature{display:flex;align-items:center;gap:8px;font-size:0.85rem;color:var(--text2)}
    .tier-feature .ti{color:var(--green);font-size:15px;flex-shrink:0}
    .tip-btn{width:100%;padding:10px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;font-size:0.88rem;font-weight:600;color:var(--text);transition:all var(--t);font-family:var(--font-body)}
    .tip-btn:hover{border-color:var(--gold);color:var(--gold)}
    .tip-btn.active{background:var(--gold-bg);border-color:var(--gold);color:var(--gold)}
    .media-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;border-radius:var(--radius-lg);overflow:hidden}
    .media-item{aspect-ratio:1;background:var(--surface2);overflow:hidden;cursor:pointer;position:relative}
    .media-item img,.media-item video{width:100%;height:100%;object-fit:cover;transition:transform var(--t)}
    .media-item:hover img,.media-item:hover video{transform:scale(1.05)}
    .media-locked{position:absolute;inset:0;background:rgba(9,9,13,0.8);backdrop-filter:blur(12px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px}
    .media-locked .ti{font-size:28px;color:var(--brand)}
    .media-locked span{font-size:0.75rem;color:var(--text3)}
    .review-item{background:var(--surface2);border-radius:var(--radius);padding:14px;margin-bottom:10px}
    .stars{color:var(--gold);font-size:14px;letter-spacing:2px}
  </style>
</head>
<body>
<div class="sidebar-overlay"></div>
<aside class="app-sidebar" id="appSidebar"></aside>
<header class="app-header" id="appHeader"></header>
<div class="page-wrap">
  <main class="main-content">
    <!-- COVER -->
    <div class="profile-cover" id="profileCover">
      <div class="profile-cover-actions">
        <button class="btn btn-surface btn-sm" onclick="shareProfile()"><i class="ti ti-share"></i> Share</button>
        <button class="btn btn-surface btn-sm" id="reportBtn" onclick="openModal('reportModal')"><i class="ti ti-flag"></i> Report</button>
      </div>
    </div>

    <div class="profile-header">
      <div class="profile-avatar-row">
        <div class="profile-avatar" id="profileAvatar">A</div>
        <div class="profile-actions">
          <button class="btn btn-outline btn-sm" id="followBtn" onclick="toggleFollow()"><i class="ti ti-heart"></i> Follow</button>
          <button class="btn btn-surface btn-sm" onclick="openModal('tipModal')"><i class="ti ti-coin"></i> Tip</button>
          <a href="/pages/messages.html" id="msgBtn" class="btn btn-surface btn-sm"><i class="ti ti-message"></i> Message</a>
          <button class="btn btn-brand btn-sm" onclick="openModal('subscribeModal')"><i class="ti ti-crown"></i> Subscribe</button>
        </div>
      </div>
      <div class="profile-name" id="profileName">Loading...</div>
      <div class="profile-handle" id="profileHandle"></div>
      <div class="profile-meta" id="profileMeta"></div>
      <div class="profile-bio" id="profileBio"></div>
      <div class="profile-stats" id="profileStats"></div>
      <div class="profile-tabs-wrap">
        <div class="tabs" style="border:none">
          <button class="tab active" onclick="switchTab('posts',this)"><i class="ti ti-layout-grid"></i> Posts</button>
          <button class="tab" onclick="switchTab('videos',this)"><i class="ti ti-video"></i> Videos</button>
          <button class="tab" onclick="switchTab('photos',this)"><i class="ti ti-photo"></i> Photos</button>
          <button class="tab" onclick="switchTab('subscribe',this)"><i class="ti ti-crown"></i> Subscribe</button>
          <button class="tab" onclick="switchTab('reviews',this)"><i class="ti ti-star"></i> Reviews</button>
        </div>
      </div>
    </div>

    <div class="profile-body">
      <!-- POSTS TAB -->
      <div id="tab-posts" class="tab-content active">
        <div id="postsGrid" class="flex-col gap-20">
          <div class="loading-center"><div class="spinner"></div></div>
        </div>
      </div>

      <!-- VIDEOS TAB -->
      <div id="tab-videos" class="tab-content">
        <div class="media-grid" id="videosGrid"></div>
      </div>

      <!-- PHOTOS TAB -->
      <div id="tab-photos" class="tab-content">
        <div class="media-grid" id="photosGrid"></div>
      </div>

      <!-- SUBSCRIBE TAB -->
      <div id="tab-subscribe" class="tab-content">
        <h3 style="margin-bottom:20px">Subscription Plans</h3>
        <div class="grid-3" id="tiersGrid" style="gap:16px"></div>
      </div>

      <!-- REVIEWS TAB -->
      <div id="tab-reviews" class="tab-content">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
          <h3>Reviews</h3>
          <button class="btn btn-outline btn-sm" onclick="openModal('reviewModal')"><i class="ti ti-pencil"></i> Write Review</button>
        </div>
        <div id="reviewsList"></div>
      </div>
    </div>
  </main>
</div>

<!-- SUBSCRIBE MODAL -->
<div class="modal-backdrop" id="subscribeModal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal('subscribeModal')"><i class="ti ti-x"></i></button>
    <div class="modal-title">Subscribe to <span id="subCreatorName"></span></div>
    <div class="modal-sub">Choose a plan and unlock exclusive content</div>
    <div id="subTiersModal" class="flex-col gap-12"></div>
  </div>
</div>

<!-- TIP MODAL -->
<div class="modal-backdrop" id="tipModal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal('tipModal')"><i class="ti ti-x"></i></button>
    <div class="modal-title">Send a Tip</div>
    <div class="modal-sub">Show your appreciation</div>
    <div class="grid-3" style="gap:10px;margin-bottom:16px">
      <button class="tip-btn" onclick="selectTip(this,2)">$2</button>
      <button class="tip-btn" onclick="selectTip(this,5)">$5</button>
      <button class="tip-btn" onclick="selectTip(this,10)">$10</button>
      <button class="tip-btn" onclick="selectTip(this,20)">$20</button>
      <button class="tip-btn" onclick="selectTip(this,50)">$50</button>
      <button class="tip-btn" onclick="selectTip(this,100)">$100</button>
    </div>
    <div class="form-group" style="margin-bottom:14px">
      <label class="form-label">Custom Amount (USD)</label>
      <div class="input-group"><i class="ti ti-currency-dollar"></i><input class="input" type="number" id="customTip" min="1" placeholder="Enter amount" /></div>
    </div>
    <div class="form-group" style="margin-bottom:20px">
      <label class="form-label">Message (optional)</label>
      <textarea class="textarea" id="tipMsg" placeholder="Add a message..." rows="2"></textarea>
    </div>
    <button class="btn btn-brand btn-md btn-full" onclick="sendTip()"><i class="ti ti-coin"></i> Send Tip</button>
  </div>
</div>

<!-- REPORT MODAL -->
<div class="modal-backdrop" id="reportModal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal('reportModal')"><i class="ti ti-x"></i></button>
    <div class="modal-title">Report Creator</div>
    <div class="form-group" style="margin-bottom:16px">
      <label class="form-label">Reason</label>
      <select class="select" id="reportReason">
        <option>Underage content</option>
        <option>Fake profile</option>
        <option>Harassment</option>
        <option>Illegal content</option>
        <option>Spam</option>
        <option>Other</option>
      </select>
    </div>
    <div class="form-group" style="margin-bottom:20px">
      <label class="form-label">Details</label>
      <textarea class="textarea" id="reportDetails" placeholder="Describe the issue..." rows="3"></textarea>
    </div>
    <button class="btn btn-danger btn-md btn-full" onclick="submitReport()"><i class="ti ti-flag"></i> Submit Report</button>
  </div>
</div>

<!-- REVIEW MODAL -->
<div class="modal-backdrop" id="reviewModal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal('reviewModal')"><i class="ti ti-x"></i></button>
    <div class="modal-title">Write a Review</div>
    <div class="form-group" style="margin-bottom:16px">
      <label class="form-label">Rating</label>
      <div class="flex gap-8" id="starRating">
        <button class="btn btn-icon" onclick="setRating(1,this)"><i class="ti ti-star"></i></button>
        <button class="btn btn-icon" onclick="setRating(2,this)"><i class="ti ti-star"></i></button>
        <button class="btn btn-icon" onclick="setRating(3,this)"><i class="ti ti-star"></i></button>
        <button class="btn btn-icon" onclick="setRating(4,this)"><i class="ti ti-star"></i></button>
        <button class="btn btn-icon" onclick="setRating(5,this)"><i class="ti ti-star"></i></button>
      </div>
    </div>
    <div class="form-group" style="margin-bottom:20px">
      <label class="form-label">Review</label>
      <textarea class="textarea" id="reviewText" placeholder="Share your experience..." rows="4"></textarea>
    </div>
    <button class="btn btn-brand btn-md btn-full" onclick="submitReview()"><i class="ti ti-send"></i> Post Review</button>
  </div>
</div>

<script src="/assets/js/app.js"></script>
<script src="/assets/js/layout.js"></script>
<script>
  Layout.init();
  let selectedTip = 0, selectedRating = 0;
  let profileData = null;

  function getQueryParam(name) {
    return new URLSearchParams(window.location.search).get(name) || '';
  }

  function getCoverColor(seed) {
    const colors = ['#2D1B69','#1A2D1A','#2D2D1A','#1A1A2D','#2D2A1A','#1A2D2D','#2A1A2D'];
    const index = [...seed].reduce((sum, ch) => sum + ch.charCodeAt(0), 0) % colors.length;
    return colors[index];
  }

  function renderProfile(user) {
    const displayName = user.username || 'Creator';
    const coverColor = user.avatar ? '#2D1B69' : getCoverColor(displayName);
    document.getElementById('profileCover').style.background = `linear-gradient(135deg, ${coverColor}, #0a0a0a)`;
    document.getElementById('profileAvatar').innerHTML = user.avatar ? `<img src="${user.avatar}" />` : fmt.initials(displayName);
    document.getElementById('profileName').innerHTML = `${fmt.esc(displayName)} ${user.isPremium ? '<span class="badge badge-verified"><i class="ti ti-shield-check"></i> Premium</span>' : ''}`;
    document.getElementById('profileHandle').textContent = '@' + displayName;
    document.getElementById('profileMeta').innerHTML = `
      <div class="profile-meta-item"><i class="ti ti-circle-filled" style="color:var(--green);font-size:8px"></i>${user.status === 'active' ? 'Active creator' : user.status}</div>
      <div class="profile-meta-item"><i class="ti ti-calendar"></i> Joined ${new Date(user.createdAt).toLocaleDateString()}</div>`;
    document.getElementById('profileBio').textContent = user.bio || 'Creator on UX-HUB sharing exclusive content and live experiences.';
    document.getElementById('profileStats').innerHTML = `
      <div class="profile-stat"><strong>${fmt.num(user.uploadCount || 0)}</strong><span>Uploads</span></div>
      <div class="profile-stat"><strong>${fmt.num(user.uploadCount ? (user.uploadCount * 120 + 800) : 1200)}</strong><span>Followers</span></div>
      <div class="profile-stat"><strong>4.8</strong><span>Rating</span></div>`;
    document.getElementById('subCreatorName').textContent = displayName;
    // wire message button to open/create conversation with this user
    const msgBtn = document.getElementById('msgBtn');
    if (msgBtn) msgBtn.href = `/pages/messages.html?userid=${user._id}`;
  }

  function renderTiers(user) {
    const plans = [
      { name: 'Basic', price: 9, features: ['Access to public posts', 'DM access', 'Monthly live access'] },
      { name: 'Premium', price: 25, recommended: true, features: ['Premium content', 'HD videos', 'Priority replies'] },
      { name: 'VIP', price: 60, features: ['1-on-1 call', 'Custom requests', 'Priority booking'] },
    ];
    document.getElementById('tiersGrid').innerHTML = plans.map(t => `
      <div class="sub-tier-card ${t.recommended ? 'recommended' : ''}">
        ${t.recommended ? '<div class="tag tag-brand" style="margin-bottom:10px;font-size:0.7rem">Most Popular</div>' : ''}
        <div class="tier-price">$${t.price}<span class="tier-period">/mo</span></div>
        <div style="font-weight:700;margin:6px 0">${t.name}</div>
        <div class="tier-features">${t.features.map(f => `<div class="tier-feature"><i class="ti ti-check"></i>${f}</div>`).join('')}</div>
        <button class="btn btn-brand btn-sm btn-full" onclick="subscribe('${t.name}',${t.price})"><i class="ti ti-crown"></i> Subscribe — $${t.price}/mo</button>
      </div>`).join('');
    document.getElementById('subTiersModal').innerHTML = plans.map(t => `
      <div style="display:flex;justify-content:space-between;align-items:center;padding:14px;background:var(--surface2);border-radius:var(--radius);border:1px solid var(--border)">
        <div><div style="font-weight:700">${t.name}</div><div class="text-sm" style="color:var(--text3)">${t.features[0]}</div></div>
        <button class="btn btn-brand btn-sm" onclick="subscribe('${t.name}',${t.price})">$${t.price}/mo</button>
      </div>`).join('');
  }

  function renderVideos(videos) {
    const grid = document.getElementById('videosGrid');
    if (!videos.length) {
      grid.innerHTML = '<div class="media-item" style="grid-column:1/-1;padding:24px;text-align:center;color:var(--text3)">No videos available yet.</div>';
      return;
    }
    grid.innerHTML = videos.map(v => `
      <div class="media-item" onclick="window.location='/pages/live-watch.html?id=${v._id}'" style="background:#111;cursor:pointer">
        <div style="position:absolute;inset:0;background:linear-gradient(180deg,transparent,rgba(0,0,0,0.45));"></div>
        <div style="position:absolute;bottom:12px;left:12px;color:#fff;font-size:0.9rem;font-weight:700">${fmt.esc(v.title || 'Creator video')}</div>
      </div>`).join('');
  }

  function renderPosts() {
    const grid = document.getElementById('postsGrid');
    grid.innerHTML = `<div class="post-card"><div class="post-body"><p class="post-text">This creator uses UX-HUB to publish exclusive updates and content. Subscribe to unlock private posts.</p></div></div>`;
  }

  function renderReviews() {
    document.getElementById('reviewsList').innerHTML = `
      <div class="review-item">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <div class="flex items-center gap-8">
            <div class="avatar avatar-xs" style="background:var(--gradient)">J</div>
            <strong style="font-size:0.85rem">J***e</strong>
          </div>
          <div style="display:flex;gap:2px">${Array.from({ length: 5 }).map(() => '<i class="ti ti-star-filled" style="color:var(--gold);font-size:13px"></i>').join('')}</div>
        </div>
        <p style="font-size:0.85rem;color:var(--text2)">Amazing content and great response time. Highly recommended.</p>
        <p class="text-xs" style="color:var(--text3);margin-top:6px">2 days ago</p>
      </div>`;
  }

  function renderPhotos() {
    const html = Array.from({ length: 9 }, (_, i) => `
      <div class="media-item" style="background:rgba(255,255,255,0.02);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.15);font-size:28px"><i class="ti ti-photo"></i></div>`).join('');
    document.getElementById('photosGrid').innerHTML = html;
  }

  function switchTab(name, btn) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-'+name).classList.add('active');
  }

  async function loadProfile() {
    const id = getQueryParam('id');
    if (!id) {
      return document.getElementById('profileName').textContent = 'Creator not found';
    }

    try {
      const response = await api.get(`/users/${encodeURIComponent(id)}`);
      if (!response.success) throw new Error(response.message || 'Profile not found');
      profileData = response.user;
      renderProfile(profileData);
      renderTiers(profileData);
      renderPosts();
      renderVideos(response.videos || []);
      renderPhotos();
      renderReviews();
    } catch (err) {
      console.error(err);
      document.getElementById('profileName').textContent = 'Unable to load profile';
      document.getElementById('profileBio').textContent = err.message;
    }
  }

  function selectTip(btn, amount) {
    document.querySelectorAll('.tip-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedTip = amount;
  }

  function setRating(n) {
    selectedRating = n;
    document.querySelectorAll('#starRating .btn-icon').forEach((b, i) => {
      b.querySelector('i').className = `ti ti-star${i < n ? '-filled' : ''}`;
      b.style.color = i < n ? 'var(--gold)' : '';
    });
  }

  function toggleFollow() {
    const btn = document.getElementById('followBtn');
    const following = btn.classList.toggle('btn-brand');
    btn.classList.toggle('btn-outline');
    btn.innerHTML = following ? '<i class="ti ti-heart-filled"></i> Following' : '<i class="ti ti-heart"></i> Follow';
    Toast.show(following ? 'Following!' : 'Unfollowed', following ? 'success' : 'info');
  }

  function subscribe(tier, price) {
    if (!Auth.isLoggedIn()) return window.location.href='/login.html';
    closeModal('subscribeModal');
    window.location.href = `/pages/checkout.html?tier=${tier}&price=${price}&creator=${profileData?._id || ''}`;
  }

  async function sendTip() {
    const amt = selectedTip || parseInt(document.getElementById('customTip').value) || 0;
    if (!amt) return Toast.show('Select a tip amount','warning');
    if (!Auth.isLoggedIn()) return window.location.href = '/login.html';

    try {
      await api.post('/payments/tips', {
        creatorId: profileData?._id,
        amount: amt,
        message: document.getElementById('tipMsg').value.trim(),
      });
      Toast.show(`Tip of $${amt} sent!`, 'success');
      closeModal('tipModal');
      selectedTip = 0;
      document.querySelectorAll('.tip-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('customTip').value = '';
      document.getElementById('tipMsg').value = '';
    } catch (err) {
      Toast.show(err.message || 'Unable to send tip', 'error');
    }
  }

  function submitReport() {
    Toast.show('Report submitted. Thank you.','success');
    closeModal('reportModal');
  }

  function submitReview() {
    if (!selectedRating) return Toast.show('Please select a rating','warning');
    Toast.show('Review posted!','success');
    closeModal('reviewModal');
  }

  function likePost(btn) {
    btn.classList.toggle('liked');
  }

  function shareProfile() {
    navigator.clipboard?.writeText(window.location.href);
    Toast.show('Profile link copied!','success');
  }

  document.addEventListener('DOMContentLoaded', () => {
    loadProfile();
  });
</script>
</body></html>
