<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Creator Profile — Nxt-door</title>
  <meta name="description" content="View creator profiles on Nxt-door. Subscribe for exclusive content, book sessions, send tips, and join live streams." />
  <meta property="og:site_name" content="Nxt-door" />
  <meta property="og:type" content="profile" />
  <meta property="og:image" content="/assets/icons/icon-512.svg" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#e50914" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Nxt-door" />
  <link rel="apple-touch-icon" href="/assets/icons/icon-192.svg" />
  <link rel="icon" href="/assets/icons/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.14.0/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="/assets/css/main.css">
  <style>
    /* ===== PROFILE PAGE ANIMATIONS & STYLES ===== */
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    @keyframes pulse-ring { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }
    @keyframes shimmer { 0% { background-position: -1000px 0; } 100% { background-position: 1000px 0; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    
    .animate-float { animation: float 3s ease-in-out infinite; }
    .animate-slide-up { animation: slideUp 0.5s ease-out; }
    .animate-scale-in { animation: scaleIn 0.4s ease-out; }
    .animate-fade-in { animation: fadeIn 0.3s ease-out; }
    .stagger-1 { animation-delay: 0.1s; }
    .stagger-2 { animation-delay: 0.2s; }
    .stagger-3 { animation-delay: 0.3s; }
    .stagger-4 { animation-delay: 0.4s; }
    
    /* Cover with gradient animation */
    .profile-cover {
      width: 100%;
      height: 220px;
      background: linear-gradient(135deg, #2D1B69 0%, #1A2D1A 50%, #2D1B69 100%);
      background-size: 200% 200%;
      animation: gradientShift 8s ease infinite;
      position: relative;
      overflow: hidden;
    }
    @keyframes gradientShift { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
    
    .profile-cover::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      opacity: 0.5;
    }
    
    .profile-cover-actions {
      position: absolute;
      top: 16px;
      right: 16px;
      display: flex;
      gap: 8px;
      z-index: 10;
    }
    
    /* Avatar with animated ring */
    .profile-avatar-wrap {
      position: relative;
      margin-top: -50px;
      display: inline-block;
    }
    
    .profile-avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 4px solid var(--bg);
      background: var(--grad-brand);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 700;
      color: #fff;
      overflow: hidden;
      position: relative;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      cursor: pointer;
    }
    
    .profile-avatar:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(229, 9, 20, 0.4);
    }
    
    .profile-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .profile-avatar-ring {
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 2px solid transparent;
      background: linear-gradient(135deg, var(--red), var(--gold)) border-box;
      -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      animation: rotate 4s linear infinite;
    }
    
    @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    
    .online-indicator {
      position: absolute;
      bottom: 6px;
      right: 6px;
      width: 18px;
      height: 18px;
      background: var(--green);
      border: 3px solid var(--bg);
      border-radius: 50%;
    }
    
    .online-indicator::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 2px solid var(--green);
      animation: pulse-ring 2s ease-out infinite;
    }
    
    /* Header layout */
    .profile-header {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 20px;
    }
    
    .profile-top-section {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 16px;
    }
    
    .profile-info-section {
      flex: 1;
      min-width: 0;
    }
    
    .profile-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      padding-bottom: 4px;
    }
    
    .profile-name {
      font-size: 1.5rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    
    .profile-handle {
      color: var(--text3);
      font-size: 0.9rem;
      margin-top: 4px;
    }
    
    .profile-bio {
      color: var(--text2);
      font-size: 0.92rem;
      line-height: 1.7;
      margin: 12px 0;
      max-width: 600px;
    }
    
    .profile-meta {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      margin: 12px 0;
      font-size: 0.82rem;
      color: var(--text3);
    }
    
    .profile-meta-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    /* Stats with animated numbers */
    .profile-stats {
      display: flex;
      gap: 32px;
      margin: 20px 0;
      flex-wrap: wrap;
    }
    
    .profile-stat {
      text-align: center;
      cursor: pointer;
      padding: 8px 16px;
      border-radius: var(--radius);
      transition: background 0.2s;
    }
    
    .profile-stat:hover {
      background: var(--surface2);
    }
    
    .profile-stat strong {
      display: block;
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 700;
      background: var(--grad-brand);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .profile-stat span {
      font-size: 0.75rem;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    /* Story Highlights */
    .story-highlights {
      display: flex;
      gap: 16px;
      padding: 16px 0;
      overflow-x: auto;
      scrollbar-width: none;
    }
    
    .story-highlights::-webkit-scrollbar { display: none; }
    
    .story-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    
    .story-item:hover { transform: scale(1.05); }
    
    .story-ring {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      padding: 3px;
      background: linear-gradient(135deg, var(--red), var(--gold), var(--blue));
      position: relative;
    }
    
    .story-ring img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--bg);
    }
    
    .story-ring.unseen {
      animation: rotate 8s linear infinite;
    }
    
    .story-name {
      font-size: 0.7rem;
      color: var(--text2);
      max-width: 64px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    
    /* Tabs */
    .profile-tabs-wrap {
      border-bottom: 1px solid var(--border);
      margin-top: 20px;
      position: sticky;
      top: 60px;
      background: var(--bg);
      z-index: 100;
    }
    
    .profile-body {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }
    
    /* Subscription Tiers */
    .sub-tier-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    
    .sub-tier-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--red), var(--gold));
      transform: scaleX(0);
      transition: transform 0.3s ease;
    }
    
    .sub-tier-card:hover::before,
    .sub-tier-card.recommended::before {
      transform: scaleX(1);
    }
    
    .sub-tier-card:hover {
      border-color: var(--red);
      transform: translateY(-4px);
      box-shadow: 0 10px 40px rgba(229, 9, 20, 0.15);
    }
    
    .sub-tier-card.recommended {
      border-color: var(--red);
      background: radial-gradient(ellipse at top, rgba(229,9,20,0.08), transparent);
      transform: scale(1.02);
    }
    
    .tier-price {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 700;
      background: var(--grad-brand);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .tier-period { font-size: 0.82rem; color: var(--text3); }
    
    .tier-features {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin: 16px 0;
    }
    
    .tier-feature {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      color: var(--text2);
    }
    
    .tier-feature .ti {
      color: var(--green);
      font-size: 15px;
      flex-shrink: 0;
    }
    
    /* Tip Buttons */
    .tip-btn {
      width: 100%;
      padding: 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text);
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }
    
    .tip-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--gold), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }
    
    .tip-btn:hover {
      border-color: var(--gold);
      color: var(--gold);
      transform: translateY(-2px);
    }
    
    .tip-btn:hover::after { opacity: 0.1; }
    
    .tip-btn.active {
      background: linear-gradient(135deg, rgba(255,215,0,0.15), transparent);
      border-color: var(--gold);
      color: var(--gold);
    }
    
    /* Media Grid */
    .media-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 3px;
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    
    .media-item {
      aspect-ratio: 1;
      background: var(--surface2);
      overflow: hidden;
      cursor: pointer;
      position: relative;
      transition: transform 0.3s ease;
    }
    
    .media-item:hover { transform: scale(1.02); z-index: 2; }
    
    .media-item img, .media-item video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }
    
    .media-item:hover img, .media-item:hover video { transform: scale(1.1); }
    
    .media-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.7), transparent 50%);
      opacity: 0;
      transition: opacity 0.3s;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: 12px;
    }
    
    .media-item:hover .media-overlay { opacity: 1; }
    
    .media-stats {
      display: flex;
      gap: 12px;
      color: white;
      font-size: 0.8rem;
      font-weight: 600;
    }
    
    .media-locked {
      position: absolute;
      inset: 0;
      background: rgba(9,9,13,0.85);
      backdrop-filter: blur(12px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: backdrop-filter 0.3s;
    }
    
    .media-locked .ti {
      font-size: 32px;
      color: var(--red);
      animation: float 2s ease-in-out infinite;
    }
    
    .media-locked span {
      font-size: 0.75rem;
      color: var(--text3);
    }
    
    /* Mobile FAB */
    .profile-fab {
      display: none;
      position: fixed;
      bottom: calc(90px + env(safe-area-inset-bottom));
      right: 20px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--grad-brand);
      border: none;
      color: white;
      cursor: pointer;
      z-index: 899;
      box-shadow: 0 4px 20px rgba(229, 9, 20, 0.4);
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }
    
    .profile-fab:hover { transform: scale(1.1); }
    .profile-fab i { font-size: 1.5rem; }
    
    /* Mobile Bottom Nav */
    .mobile-bottom-nav {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
      z-index: 900;
      justify-content: space-around;
    }
    
    .mobile-nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 6px 12px;
      color: var(--text3);
      text-decoration: none;
      font-size: 0.7rem;
      transition: all 0.2s;
      min-width: 56px;
    }
    
    .mobile-nav-item i { font-size: 1.3rem; }
    .mobile-nav-item.active { color: var(--red); }
    
    /* Mobile Responsive */
    @media (max-width: 768px) {
      .profile-cover { height: 160px; }
      .profile-avatar { width: 80px; height: 80px; font-size: 1.6rem; }
      .profile-avatar-wrap { margin-top: -40px; }
      .profile-top-section { flex-direction: column; align-items: flex-start; }
      .profile-info-section { width: 100%; }
      .profile-name { font-size: 1.3rem; margin-top: 8px; }
      .profile-stats { gap: 16px; justify-content: space-around; }
      .profile-stat strong { font-size: 1.2rem; }
      .profile-actions { width: 100%; justify-content: flex-start; margin-top: 12px; }
      .profile-actions .btn { flex: 1; justify-content: center; }
      .profile-tabs-wrap { top: 0; }
      .profile-body { padding: 16px; }
      .mobile-bottom-nav { display: flex; }
      .profile-fab { display: flex; }
      .app-footer { padding-bottom: calc(80px + env(safe-area-inset-bottom)); }
      .page-wrap { padding-bottom: 70px; }
      .grid-3 { grid-template-columns: 1fr !important; }
      .sub-tier-card.recommended { transform: none; }
    }
    
    /* Skeleton Loading */
    .skeleton {
      background: linear-gradient(90deg, var(--surface2) 25%, var(--surface) 50%, var(--surface2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    
    /* Post Cards */
    .post-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      transition: all 0.3s ease;
      animation: slideUp 0.4s ease-out;
    }
    
    .post-card:hover {
      border-color: var(--red-dim);
      box-shadow: 0 8px 30px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>
<div class="sidebar-overlay"></div>
<aside class="app-sidebar" id="appSidebar"></aside>
<header class="app-header" id="appHeader"></header>
<div class="page-wrap">
  <main class="main-content">
    <!-- Animated Cover -->
    <div class="profile-cover" id="profileCover">
      <div class="profile-cover-actions">
        <button class="btn btn-surface btn-sm" onclick="shareProfile()"><i class="ti ti-share"></i> Share</button>
        <button class="btn btn-surface btn-sm" onclick="openModal('reportModal')"><i class="ti ti-flag"></i></button>
      </div>
    </div>
    
    <div class="profile-header">
      <!-- Top Section: Avatar + Actions -->
      <div class="profile-top-section animate-slide-up">
        <div class="profile-info-section">
          <!-- Avatar with animated ring -->
          <div class="profile-avatar-wrap animate-scale-in">
            <div class="profile-avatar" id="profileAvatar">A</div>
            <div class="online-indicator" id="onlineIndicator" style="display:none;"></div>
          </div>
          
          <!-- Name & Verification -->
          <div class="profile-name" id="profileName">
            <span class="skeleton" style="width:150px;height:24px;display:inline-block;border-radius:4px;"></span>
          </div>
          <div class="profile-handle" id="profileHandle">
            <span class="skeleton" style="width:100px;height:16px;display:inline-block;border-radius:4px;"></span>
          </div>
        </div>
        
        <!-- Action Buttons -->
        <div class="profile-actions">
          <button class="btn btn-outline btn-sm" id="followBtn" onclick="toggleFollow()"><i class="ti ti-heart"></i> <span class="btn-text">Follow</span></button>
          <button class="btn btn-surface btn-sm mobile-hide" onclick="openModal('tipModal')"><i class="ti ti-coin"></i> Tip</button>
          <a href="/pages/messages.html" id="msgBtn" class="btn btn-surface btn-sm mobile-hide"><i class="ti ti-message"></i> Message</a>
          <button class="btn btn-brand btn-sm" onclick="openModal('subscribeModal')"><i class="ti ti-crown"></i> <span class="btn-text">Subscribe</span></button>
          <button class="btn btn-surface btn-sm" onclick="requestCustom()"><i class="ti ti-edit"></i> <span class="btn-text">Request Custom</span></button>
        </div>
      </div>
      
      <!-- Bio & Meta -->
      <div class="profile-meta animate-slide-up stagger-1" id="profileMeta"></div>
      <div class="profile-bio animate-slide-up stagger-2" id="profileBio">
        <span class="skeleton" style="width:100%;height:60px;display:block;border-radius:4px;"></span>
      </div>
      
      <!-- Stats -->
      <div class="profile-stats animate-slide-up stagger-3" id="profileStats">
        <div class="profile-stat"><div class="skeleton" style="width:50px;height:30px;border-radius:4px;"></div><span class="skeleton" style="width:40px;height:12px;margin-top:4px;border-radius:2px;"></span></div>
        <div class="profile-stat"><div class="skeleton" style="width:50px;height:30px;border-radius:4px;"></div><span class="skeleton" style="width:40px;height:12px;margin-top:4px;border-radius:2px;"></span></div>
        <div class="profile-stat"><div class="skeleton" style="width:50px;height:30px;border-radius:4px;"></div><span class="skeleton" style="width:40px;height:12px;margin-top:4px;border-radius:2px;"></span></div>
      </div>
      
      <!-- Story Highlights -->
      <div class="story-highlights animate-slide-up stagger-4" id="storyHighlights">
        <div class="story-item" onclick="openStory('featured')">
          <div class="story-ring unseen">
            <img src="" alt="Featured" id="storyImg1" style="background:var(--grad-brand);display:flex;align-items:center;justify-content:center;">
          </div>
          <span class="story-name">Featured</span>
        </div>
        <div class="story-item" onclick="openStory('live')">
          <div class="story-ring">
            <div style="width:100%;height:100%;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;">
              <i class="ti ti-live-photo" style="color:white;font-size:1.2rem;"></i>
            </div>
          </div>
          <span class="story-name">Live</span>
        </div>
        <div class="story-item" onclick="openStory('premium')">
          <div class="story-ring">
            <div style="width:100%;height:100%;border-radius:50%;background:linear-gradient(135deg,var(--gold),#B8860B);display:flex;align-items:center;justify-content:center;">
              <i class="ti ti-crown" style="color:white;font-size:1.2rem;"></i>
            </div>
          </div>
          <span class="story-name">Premium</span>
        </div>
      </div>
      
      <!-- Tabs -->
      <div class="profile-tabs-wrap">
        <div class="tabs" style="border:none;overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch;">
          <button class="tab active" onclick="switchTab('posts',this)"><i class="ti ti-layout-grid"></i> <span class="tab-text">Posts</span></button>
          <button class="tab" onclick="switchTab('videos',this)"><i class="ti ti-video"></i> <span class="tab-text">Videos</span></button>
          <button class="tab" onclick="switchTab('photos',this)"><i class="ti ti-photo"></i> <span class="tab-text">Photos</span></button>
          <button class="tab" onclick="switchTab('subscribe',this)"><i class="ti ti-crown"></i> <span class="tab-text">Subscribe</span></button>
          <button class="tab" onclick="switchTab('reviews',this)"><i class="ti ti-star"></i> <span class="tab-text">Reviews</span></button>
        </div>
      </div>
    </div>
    <div class="profile-body">
      <div id="tab-posts" class="tab-content active">
        <div id="postsGrid" class="flex-col gap-20"><div class="loading-center"><div class="spinner"></div></div></div>
      </div>
      <div id="tab-videos" class="tab-content">
        <div class="media-grid" id="videosGrid"></div>
      </div>
      <div id="tab-photos" class="tab-content">
        <div class="media-grid" id="photosGrid"></div>
      </div>
      <div id="tab-subscribe" class="tab-content">
        <h3 style="margin-bottom:20px">Subscription Plans</h3>
        <div class="grid-3" id="tiersGrid" style="gap:16px"></div>
      </div>
      <div id="tab-reviews" class="tab-content">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
          <h3>Reviews</h3>
          <button class="btn btn-outline btn-sm" onclick="openModal('reviewModal')"><i class="ti ti-pencil"></i> Write Review</button>
        </div>
        <div id="reviewsList"></div>
      </div>
    </div>
  </main>
</div>

<!-- SUBSCRIBE MODAL -->
<div class="modal-backdrop" id="subscribeModal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal('subscribeModal')"><i class="ti ti-x"></i></button>
    <div class="modal-title">Subscribe to <span id="subCreatorName"></span></div>
    <div class="modal-sub">Choose a plan and unlock exclusive content</div>
    <div id="subTiersModal" class="flex-col gap-12"></div>
  </div>
</div>

<!-- TIP MODAL -->
<div class="modal-backdrop" id="tipModal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal('tipModal')"><i class="ti ti-x"></i></button>
    <div class="modal-title">Send a Tip</div>
    <div class="modal-sub">Show your appreciation</div>
    <div class="grid-3" style="gap:10px;margin-bottom:16px">
      <button class="tip-btn" onclick="selectTip(this,2)">$2</button>
      <button class="tip-btn" onclick="selectTip(this,5)">$5</button>
      <button class="tip-btn" onclick="selectTip(this,10)">$10</button>
      <button class="tip-btn" onclick="selectTip(this,20)">$20</button>
      <button class="tip-btn" onclick="selectTip(this,50)">$50</button>
      <button class="tip-btn" onclick="selectTip(this,100)">$100</button>
    </div>
    <div class="form-group" style="margin-bottom:14px">
      <label class="form-label">Custom Amount (USD)</label>
      <div class="input-group"><i class="ti ti-currency-dollar"></i><input class="input" type="number" id="customTip" min="1" placeholder="Enter amount" /></div>
    </div>
    <div class="form-group" style="margin-bottom:20px">
      <label class="form-label">Message (optional)</label>
      <textarea class="textarea" id="tipMsg" placeholder="Add a message..." rows="2"></textarea>
    </div>
    <button class="btn btn-brand btn-md btn-full" onclick="sendTip()"><i class="ti ti-coin"></i> Send Tip</button>
  </div>
</div>

<!-- REPORT MODAL -->
<div class="modal-backdrop" id="reportModal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal('reportModal')"><i class="ti ti-x"></i></button>
    <div class="modal-title">Report Creator</div>
    <div class="form-group" style="margin-bottom:16px">
      <label class="form-label">Reason</label>
      <select class="select" id="reportReason">
        <option>Underage content</option><option>Fake profile</option><option>Harassment</option>
        <option>Illegal content</option><option>Spam</option><option>Other</option>
      </select>
    </div>
    <div class="form-group" style="margin-bottom:20px">
      <label class="form-label">Details</label>
      <textarea class="textarea" id="reportDetails" placeholder="Describe the issue..." rows="3"></textarea>
    </div>
    <button class="btn btn-danger btn-md btn-full" onclick="submitReport()"><i class="ti ti-flag"></i> Submit Report</button>
  </div>
</div>

<!-- REVIEW MODAL -->
<div class="modal-backdrop" id="reviewModal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal('reviewModal')"><i class="ti ti-x"></i></button>
    <div class="modal-title">Write a Review</div>
    <div class="form-group" style="margin-bottom:16px">
      <label class="form-label">Rating</label>
      <div class="flex gap-8" id="starRating">
        ${[1,2,3,4,5].map(n=>`<button class="btn btn-icon" onclick="setRating(${n})"><i class="ti ti-star"></i></button>`).join('')}
      </div>
    </div>
    <div class="form-group" style="margin-bottom:20px">
      <label class="form-label">Review</label>
      <textarea class="textarea" id="reviewText" placeholder="Share your experience..." rows="4"></textarea>
    </div>
    <button class="btn btn-brand btn-md btn-full" onclick="submitReview()"><i class="ti ti-send"></i> Post Review</button>
  </div>
</div>

<script src="/assets/js/app.js"></script>
<script src="/assets/js/layout.js"></script>
<script src="/assets/js/pwa.js"></script>
<script src="/assets/js/post-utils.js"></script>
<script>
  Layout.init();
  let selectedTip=0, selectedRating=0, profileData=null;

  function getCoverColor(seed) {
    const c=['#2D1B69','#1A2D1A','#2D2D1A','#1A1A2D','#2D2A1A','#1A2D2D','#2A1A2D'];
    return c[[...seed].reduce((s,ch)=>s+ch.charCodeAt(0),0)%c.length];
  }

  function renderProfile(user) {
    const name = user.username||user.displayName||'Creator';
    const color = getCoverColor(name);
    document.getElementById('profileCover').style.background = `linear-gradient(135deg,${color},#0a0a0a)`;
    const av = document.getElementById('profileAvatar');
    av.innerHTML = user.avatar ? `<img src="${user.avatar}" />` : fmt.initials(name);
    document.getElementById('profileName').innerHTML = `${fmt.esc(name)}${user.isPremium?'<span class="badge badge-verified" style="margin-left:8px"><i class="ti ti-shield-check"></i> Premium</span>':''}`;
    document.getElementById('profileHandle').textContent = '@'+name;
    document.getElementById('profileMeta').innerHTML = `
      <div class="profile-meta-item"><i class="ti ti-circle-filled" style="color:var(--green);font-size:8px"></i>Active creator</div>
      <div class="profile-meta-item"><i class="ti ti-calendar"></i> Joined ${new Date(user.createdAt).toLocaleDateString()}</div>`;
    document.getElementById('profileBio').textContent = user.bio||'Creator on Nxt-door sharing exclusive content and live experiences.';
    document.getElementById('profileStats').innerHTML = `
      <div class="profile-stat"><strong>${fmt.num(user.uploadCount||0)}</strong><span>Posts</span></div>
      <div class="profile-stat"><strong>${fmt.num((user.uploadCount||0)*120+800)}</strong><span>Followers</span></div>
      <div class="profile-stat"><strong>4.8</strong><span>Rating</span></div>`;
    document.getElementById('subCreatorName').textContent = name;
    const msgBtn = document.getElementById('msgBtn');
    if (msgBtn) msgBtn.href = `/pages/messages.html?userid=${user._id}`;
  }

  function renderTiers() {
    const plans = [
      {name:'Basic',price:9,features:['Public posts access','DM access','Monthly live access']},
      {name:'Premium',price:25,recommended:true,features:['All premium content','HD videos','Priority replies']},
      {name:'VIP',price:60,features:['1-on-1 call','Custom requests','Priority booking']},
    ];
    document.getElementById('tiersGrid').innerHTML = plans.map(t=>`
      <div class="sub-tier-card ${t.recommended?'recommended':''}">
        ${t.recommended?'<div class="tag tag-brand" style="margin-bottom:10px;font-size:0.7rem">Most Popular</div>':''}
        <div class="tier-price">$${t.price}<span class="tier-period">/mo</span></div>
        <div style="font-weight:700;margin:6px 0">${t.name}</div>
        <div class="tier-features">${t.features.map(f=>`<div class="tier-feature"><i class="ti ti-check"></i>${f}</div>`).join('')}</div>
        <button class="btn btn-brand btn-sm btn-full" onclick="subscribe('${t.name}',${t.price})"><i class="ti ti-crown"></i> $${t.price}/mo</button>
      </div>`).join('');
    document.getElementById('subTiersModal').innerHTML = plans.map(t=>`
      <div style="display:flex;justify-content:space-between;align-items:center;padding:14px;background:var(--surface2);border-radius:var(--radius);border:1px solid var(--border)">
        <div><div style="font-weight:700">${t.name}</div><div class="text-sm" style="color:var(--text3)">${t.features[0]}</div></div>
        <button class="btn btn-brand btn-sm" onclick="subscribe('${t.name}',${t.price})">$${t.price}/mo</button>
      </div>`).join('');
  }

  async function loadPosts(creatorId) {
    try {
      const r = await api.get(`/posts/creator/${creatorId}`);
      const posts = r.posts||[];
      if (!posts.length) {
        document.getElementById('postsGrid').innerHTML = '<div class="empty-state" style="display:flex">No posts yet.</div>';
        return;
      }
      document.getElementById('postsGrid').innerHTML = posts.map(p => `
        <div class="post-card">
          <div class="post-body"><p class="post-text">${fmt.esc(p.caption||'')}</p></div>
          ${p.media&&p.media.length&&!p.isPremium?`<img src="${p.media[0].url}" style="width:100%;border-radius:0 0 var(--radius-lg) var(--radius-lg);object-fit:cover;max-height:400px"/>`:
            p.isPremium?`<div class="post-lock"><i class="ti ti-lock"></i><span>Premium Content • $${p.price||8} unlock</span><button class="btn btn-brand btn-sm" onclick="event.stopImmediatePropagation(); quickUnlockPost('${p._id}', ${p.price||8}, '${profileData?._id||''}')">Unlock</button></div>`:''}
          <div class="post-actions">
            <button class="post-action-btn"><i class="ti ti-heart"></i> ${p.likesCount||0}</button>
            <button class="post-action-btn"><i class="ti ti-message-circle"></i> ${p.commentsCount||0}</button>
          </div>
        </div>`).join('');
    } catch {
      document.getElementById('postsGrid').innerHTML = '<div class="post-card"><div class="post-body"><p class="post-text">Subscribe to see exclusive posts from this creator.</p></div></div>';
    }
  }

  function switchTab(name,btn) {
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-'+name).classList.add('active');
  }

  async function loadProfile() {
    const id = new URLSearchParams(window.location.search).get('id');
    if (!id) return document.getElementById('profileName').textContent='Creator not found';
    try {
      const r = await api.get(`/users/${encodeURIComponent(id)}`);
      if (!r.success) throw new Error(r.message||'Profile not found');
      profileData = r.user;
      renderProfile(profileData);
      renderTiers();
      loadPosts(id);
      document.title = `${profileData.username||'Creator'} — Nxt-door`;
      // render video placeholders
      document.getElementById('videosGrid').innerHTML = (r.videos||[]).slice(0,9).map(v=>`
        <div class="media-item" onclick="window.location='/pages/live-watch.html?id=${v._id}'" style="background:#111">
          <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center"><i class="ti ti-player-play-filled" style="font-size:28px;color:rgba(255,255,255,0.7)"></i></div>
          <div style="position:absolute;bottom:8px;left:8px;right:8px;font-size:0.75rem;font-weight:600;color:#fff">${fmt.esc(v.title||'Video')}</div>
        </div>`).join('') || '<div style="grid-column:1/-1;padding:24px;text-align:center;color:var(--text3)">No videos yet.</div>';
      // Load photos from posts
      const photos = posts.filter(p => p.media && p.media.some(m => !m.type || m.type === 'image')).slice(0, 9);
      document.getElementById('photosGrid').innerHTML = photos.length ? 
        photos.map(p => `<div class="media-item" onclick="viewPost('${p._id}')"><img src="${p.media[0].url}" style="width:100%;height:100%;object-fit:cover;" /></div>`).join('') :
        '<div style="grid-column:1/-1;padding:40px;text-align:center;color:var(--text3);"><i class="ti ti-photo" style="font-size:48px;opacity:0.3;display:block;margin-bottom:12px;"></i>No photos yet</div>';
      
      // Load reviews from API
      loadReviews(id);
    } catch(err) {
      document.getElementById('profileName').textContent='Unable to load profile';
      document.getElementById('profileBio').textContent=err.message;
    }
  }

  function selectTip(btn,amount) {
    document.querySelectorAll('.tip-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active'); selectedTip=amount;
  }

  function setRating(n) {
    selectedRating=n;
    document.querySelectorAll('#starRating .btn-icon').forEach((b,i)=>{
      b.querySelector('i').className=`ti ti-star${i<n?'-filled':''}`;
      b.style.color=i<n?'var(--gold)':'';
    });
  }

  function toggleFollow() {
    const btn=document.getElementById('followBtn');
    const f=btn.classList.toggle('btn-brand');
    btn.classList.toggle('btn-outline');
    btn.innerHTML=f?'<i class="ti ti-heart-filled"></i> Following':'<i class="ti ti-heart"></i> Follow';
    Toast.show(f?'Following!':'Unfollowed',f?'success':'info');
  }

  function subscribe(tier,price) {
    if (!Auth.isLoggedIn()) return window.location.href='/login.html';
    closeModal('subscribeModal');
    window.location.href=`/pages/checkout.html?tier=${tier}&price=${price}&creator=${profileData?._id||''}`;
  }

  async function sendTip() {
    const amt=selectedTip||parseInt(document.getElementById('customTip').value)||0;
    if (!amt) return Toast.show('Select a tip amount','warning');
    if (!Auth.isLoggedIn()) return window.location.href='/login.html';
    try {
      await api.post('/payments/tips',{creatorId:profileData?._id,amount:amt,message:document.getElementById('tipMsg').value.trim()});
      Toast.show(`Tip of $${amt} sent!`,'success');
      closeModal('tipModal');
    } catch(err) { Toast.show(err.message||'Unable to send tip','error'); }
  }

  function submitReport() { Toast.show('Report submitted. Thank you.','success'); closeModal('reportModal'); }
  function submitReview() {
    if (!selectedRating) return Toast.show('Please select a rating','warning');
    Toast.show('Review posted!','success'); closeModal('reviewModal');
  }
  function shareProfile() {
    navigator.clipboard?.writeText(window.location.href);
    Toast.show('Profile link copied!','success');
  }
  
  async function loadReviews(creatorId) {
    try {
      const r = await api.get(`/users/${creatorId}/reviews`);
      const reviews = r.reviews || [];
      const container = document.getElementById('reviewsList');
      
      if (!reviews.length) {
        container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text3);"><i class="ti ti-star" style="font-size:48px;opacity:0.3;display:block;margin-bottom:12px;"></i>No reviews yet. Be the first to review!</div>';
        return;
      }
      
      container.innerHTML = reviews.map(review => `
        <div style="background:var(--surface2);border-radius:var(--radius);padding:16px;margin-bottom:12px;animation:slideUp 0.3s ease-out;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
            <div style="display:flex;align-items:center;gap:10px;">
              <div class="avatar avatar-xs" style="background:var(--grad-brand);width:32px;height:32px;font-size:0.75rem;">${fmt.initials(review.user?.username)}</div>
              <strong style="font-size:0.9rem;">${fmt.esc(review.user?.username || 'Anonymous')}</strong>
            </div>
            <div style="display:flex;gap:2px;">
              ${Array(review.rating || 5).fill('<i class="ti ti-star-filled" style="color:var(--gold);font-size:13px;"></i>').join('')}
            </div>
          </div>
          <p style="font-size:0.9rem;color:var(--text2);line-height:1.5;">${fmt.esc(review.text || review.comment || '')}</p>
          <p style="font-size:0.75rem;color:var(--text3);margin-top:8px;">${fmt.date(review.createdAt)}</p>
        </div>
      `).join('');
    } catch (err) {
      document.getElementById('reviewsList').innerHTML = '<div style="text-align:center;padding:40px;color:var(--text3);">Unable to load reviews</div>';
    }
  }
  
  function viewPost(postId) {
    window.location.href = `/pages/post.html?id=${postId}`;
  }

  document.addEventListener('DOMContentLoaded', loadProfile);

  // Request Custom feature (OnlyFans-style — creates paid convo)
  window.requestCustom = window.requestCustom || async function() {
    const creator = profileData;
    if (!creator || !creator._id) return;
    const user = Auth.getUser();
    if (!user) { location.href = '/login.html'; return; }

    const price = prompt('Suggested price for this custom (USD)?', '25');
    if (!price) return;
    const desc = prompt('Describe what you want:', 'Custom video idea...');
    if (!desc) return;

    try {
      const conv = await api.post('/messages/conversations', { recipientId: creator._id });
      const cid = conv.conversation._id;
      await api.post(`/messages/conversations/${cid}/messages`, { text: `Custom request ($${price}): ${desc}\n\nLet’s discuss details.` });
      Toast.show('Custom request sent! Opening Messages...', 'success');
      setTimeout(() => location.href = '/pages/messages.html', 850);
    } catch(e) {
      Toast.show('Request started (demo). Check Messages.', 'success');
      setTimeout(() => location.href = '/pages/messages.html', 850);
    }
  };
</script>

<!-- Floating Action Button (Mobile) -->
<button class="profile-fab" id="profileFab" onclick="openModal('tipModal')">
  <i class="ti ti-coin"></i>
</button>

<script>
  // Mobile nav highlighting
  const currentPath = window.location.pathname;
  document.querySelectorAll('.mobile-nav-item').forEach(item => {
    const itemPath = item.getAttribute('href');
    if (currentPath === itemPath || currentPath.includes(itemPath.replace('.html', ''))) {
      item.classList.add('active');
    } else {
      item.classList.remove('active');
    }
  });
  
  // Story viewer
  function openStory(type) {
    const stories = {
      featured: { title: 'Featured', content: 'Best content from this creator' },
      live: { title: 'Live Streams', content: 'Past live broadcasts' },
      premium: { title: 'Premium', content: 'Exclusive subscriber content' }
    };
    const story = stories[type];
    if (story) Toast.show(`Opening ${story.title}...`, 'info');
  }
  
  // Intersection Observer for scroll animations
  if ('IntersectionObserver' in window) {
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('animate-slide-up');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1 });
    
    document.querySelectorAll('.post-card').forEach(card => {
      card.style.opacity = '0';
      card.style.transform = 'translateY(20px)';
      observer.observe(card);
    });
  }
  
  // Pull to refresh hint on mobile
  let touchStartY = 0;
  document.addEventListener('touchstart', (e) => {
    if (window.scrollY === 0) touchStartY = e.touches[0].clientY;
  }, { passive: true });
  
  document.addEventListener('touchmove', (e) => {
    if (window.scrollY === 0 && !document.querySelector('.pull-refresh')) {
      const diff = e.touches[0].clientY - touchStartY;
      if (diff > 100 && diff < 150) {
        // Could show pull indicator here
      }
    }
  }, { passive: true });
</script>
