<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Go Live — Nxt-door</title>
  <meta name="robots" content="noindex" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#e50914" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Nxt-door" />
  <link rel="apple-touch-icon" href="/assets/icons/icon-192.svg" />
  <link rel="icon" href="/assets/icons/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.14.0/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="/assets/css/main.css" />
  <style>
    .live-studio{display:grid;grid-template-columns:1fr 320px;gap:20px;min-height:500px}
    .camera-wrap{background:#000;border-radius:var(--radius-xl);overflow:hidden;position:relative;min-height:360px;display:flex;align-items:center;justify-content:center}
    .camera-off{text-align:center;color:var(--text3)}
    .camera-off .ti{font-size:64px;display:block;margin-bottom:16px}
    .live-controls{position:absolute;bottom:0;left:0;right:0;padding:20px;background:linear-gradient(transparent,rgba(0,0,0,0.9));display:flex;align-items:center;justify-content:center;gap:14px}
    .ctrl-btn{width:52px;height:52px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;transition:all var(--t)}
    .ctrl-btn-default{background:rgba(255,255,255,0.15);color:#fff;backdrop-filter:blur(8px)}
    .ctrl-btn-default:hover{background:rgba(255,255,255,0.25)}
    .ctrl-btn-red{background:var(--red);color:#fff}
    .ctrl-btn-red:hover{background:#c0070f}
    .go-live-btn{padding:14px 36px;border-radius:var(--radius-full);background:var(--red);color:#fff;border:none;font-size:1rem;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:10px;transition:all var(--t);font-family:var(--font-body)}
    .go-live-btn:hover{background:#c0070f;transform:scale(1.03)}
    .live-sidebar{display:flex;flex-direction:column;gap:16px}
    .live-chat-box{flex:1;display:flex;flex-direction:column;min-height:0}
    .live-msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px;max-height:280px}
    .live-msg{font-size:0.82rem;line-height:1.5}
    .live-msg-name{font-weight:700;color:var(--red);margin-right:6px}
    .live-tip-msg .live-msg-name{color:var(--gold)}
    .live-input-row{padding:10px;border-top:1px solid var(--border);display:flex;gap:8px}
    @media(max-width:768px){.live-studio{grid-template-columns:1fr}.camera-wrap{min-height:260px}}
  </style>
</head>
<body>
<div class="sidebar-overlay" onclick="Sidebar.close()"></div>
<aside class="app-sidebar" id="appSidebar"></aside>
<header class="app-header" id="appHeader"></header>
<div class="page-wrap">
  <main class="main-content">
    <div class="inner-lg" style="padding-top:20px">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:20px">
        <div>
          <a href="/creator/dashboard.html" class="btn btn-ghost btn-sm" style="margin-bottom:6px"><i class="ti ti-arrow-left"></i> Dashboard</a>
          <h1 style="font-size:1.6rem">Live Studio</h1>
        </div>
        <div id="liveStats" style="display:none;gap:16px">
          <span class="badge badge-live" id="liveBadge"><span class="live-dot"></span> LIVE</span>
          <span class="tag tag-surface"><i class="ti ti-eye"></i> <span id="viewerCount">0</span> watching</span>
          <span class="tag tag-surface"><i class="ti ti-clock"></i> <span id="liveDuration">00:00</span></span>
        </div>
      </div>

      <div id="setupPanel" style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px">
        <div class="card"><div class="card-body">
          <div class="label mb-12">Stream Title</div>
          <input class="input" type="text" id="streamTitle" placeholder="e.g. Evening chat with fans" />
          <div class="label mb-8 mt-16">Access Level</div>
          <select class="select" id="streamAccess">
            <option value="subscribers">Subscribers Only</option>
            <option value="public">Everyone (Free Preview)</option>
            <option value="paid">Pay-Per-View</option>
          </select>
          <div id="ppvWrap" style="display:none;margin-top:12px">
            <div class="label mb-6">Pay-Per-View Price (USD)</div>
            <div class="input-group"><i class="ti ti-currency-dollar"></i><input class="input" type="number" id="ppvPrice" placeholder="e.g. 5" min="1" /></div>
          </div>
        </div></div>
        <div class="card"><div class="card-body">
          <div class="label mb-12">Camera Preview</div>
          <video id="previewVideo" autoplay muted style="width:100%;border-radius:var(--radius-lg);background:#000;aspect-ratio:16/9"></video>
          <button class="btn btn-surface btn-sm btn-full mt-12" onclick="requestCamera()">
            <i class="ti ti-camera"></i> Enable Camera
          </button>
        </div></div>
      </div>

      <div style="text-align:center;margin-bottom:24px" id="goLiveRow">
        <button class="go-live-btn" onclick="goLive()">
          <i class="ti ti-live-view"></i> Go Live Now
        </button>
      </div>

      <div class="live-studio" id="liveStudio" style="display:none">
        <div class="camera-wrap" id="cameraWrap">
          <video id="liveVideo" autoplay muted style="width:100%;height:100%;object-fit:cover"></video>
          <div class="live-controls">
            <button class="ctrl-btn ctrl-btn-default" onclick="toggleMic()" id="micBtn" title="Mute"><i class="ti ti-microphone"></i></button>
            <button class="ctrl-btn ctrl-btn-default" onclick="toggleCam()" id="camBtn" title="Camera"><i class="ti ti-video"></i></button>
            <button class="ctrl-btn ctrl-btn-default" onclick="shareScreen()" title="Screen Share"><i class="ti ti-screen-share"></i></button>
            <button class="ctrl-btn ctrl-btn-red" onclick="endLive()" title="End Stream"><i class="ti ti-player-stop-filled"></i></button>
          </div>
        </div>

        <div class="live-sidebar">
          <div class="card">
            <div class="card-header"><h3><i class="ti ti-target" style="color:var(--red)"></i> Tip Goal</h3></div>
            <div class="card-body">
              <div style="display:flex;justify-content:space-between;font-size:0.82rem;margin-bottom:8px">
                <span>Tips Goal</span><span style="font-weight:700;color:var(--gold)" id="goalDisplay">$0 / $100</span>
              </div>
              <div class="progress-bar"><div class="progress-fill" id="goalFill" style="width:0%"></div></div>
              <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:12px">
                <span class="tag tag-surface" style="cursor:pointer" onclick="setGoal('Dance',$10)">Dance $10</span>
                <span class="tag tag-surface" style="cursor:pointer" onclick="setGoal('Outfit',$25)">Outfit $25</span>
                <span class="tag tag-surface" style="cursor:pointer" onclick="setGoal('Show',$50)">Show $50</span>
              </div>
            </div>
          </div>

          <div class="card live-chat-box" style="min-height:320px">
            <div class="card-header" style="padding:10px 14px">
              <h3 style="font-size:0.9rem"><i class="ti ti-message-circle" style="color:var(--red)"></i> Live Chat</h3>
              <span class="tag tag-surface" style="font-size:0.7rem"><i class="ti ti-users"></i> <span id="chatViewers">0</span></span>
            </div>
            <div class="live-msgs" id="liveChat"></div>
            <div class="live-input-row">
              <input class="input input-sm" type="text" id="chatInput" placeholder="Chat as creator..." style="flex:1" onkeydown="if(event.key==='Enter')sendChatMsg()" />
              <button class="btn btn-brand btn-sm" onclick="sendChatMsg()"><i class="ti ti-send"></i></button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
<script src="/assets/js/app.js"></script>
<script src="/assets/js/layout.js"></script>
<script src="/assets/js/pwa.js"></script>
<script>
  Auth.requireAuth('/login.html');
  Auth.requireCreator();
  Layout.init('Go Live');

  let stream=null, liveTimer=null, seconds=0, viewers=0, tipsTotal=0, isLive=false;

  document.getElementById('streamAccess').addEventListener('change', function() {
    document.getElementById('ppvWrap').style.display = this.value==='paid' ? 'block' : 'none';
  });

  async function requestCamera() {
    try {
      stream = await navigator.mediaDevices.getUserMedia({video:true,audio:true});
      document.getElementById('previewVideo').srcObject = stream;
      Toast.show('Camera & microphone ready!','success');
    } catch { Toast.show('Could not access camera. Please allow camera permission.','error'); }
  }

  function goLive() {
    const title = document.getElementById('streamTitle').value.trim();
    if (!title) return Toast.show('Please enter a stream title.','warning');
    isLive=true;
    document.getElementById('setupPanel').style.display='none';
    document.getElementById('goLiveRow').style.display='none';
    document.getElementById('liveStudio').style.display='grid';
    document.getElementById('liveStats').style.display='flex';
    if (stream) document.getElementById('liveVideo').srcObject=stream;
    liveTimer = setInterval(() => {
      seconds++;
      const m=String(Math.floor(seconds/60)).padStart(2,'0');
      const s=String(seconds%60).padStart(2,'0');
      document.getElementById('liveDuration').textContent=`${m}:${s}`;
      if (Math.random()>.6) {
        viewers = Math.max(0, viewers+Math.floor(Math.random()*3)-1);
        document.getElementById('viewerCount').textContent=viewers;
        document.getElementById('chatViewers').textContent=viewers;
      }
      if (Math.random()>.85) simulateChatMsg();
    }, 1000);
    simulateChatPeriodic();
    Toast.show('You are now LIVE on Nxt-door!','success');
  }

  const fakeNames=['Sarah_K','Mike_T','Anita','James_O','Rose_254','Bella_UG'];
  const fakeMsgs=['Yesss!','Looking amazing','Fire!','Hello from Kampala','Sending love','You are so beautiful','Keep going!'];

  function simulateChatMsg() {
    const name=fakeNames[Math.floor(Math.random()*fakeNames.length)];
    const msg=fakeMsgs[Math.floor(Math.random()*fakeMsgs.length)];
    const isTip=Math.random()>.85;
    const tipAmt=isTip?[5,10,20][Math.floor(Math.random()*3)]:0;
    addChatMsg(name, isTip?`tipped $${tipAmt} — ${msg}`:msg, isTip);
    if (isTip) {
      tipsTotal+=tipAmt;
      document.getElementById('goalDisplay').textContent=`$${tipsTotal} / $100`;
      document.getElementById('goalFill').style.width=Math.min(100,tipsTotal)+'%';
    }
  }

  function simulateChatPeriodic() {
    const iv=setInterval(()=>{ if(!isLive){clearInterval(iv);return;} simulateChatMsg(); }, 3200);
  }

  function addChatMsg(name, msg, isTip=false) {
    const chat=document.getElementById('liveChat');
    const div=document.createElement('div');
    div.className=`live-msg${isTip?' live-tip-msg':''}`;
    div.innerHTML=`<span class="live-msg-name">${name}</span>${isTip?'<i class="ti ti-coin" style="color:var(--gold)"></i> ':''}${msg}`;
    chat.appendChild(div);
    chat.scrollTop=chat.scrollHeight;
  }

  function sendChatMsg() {
    const input=document.getElementById('chatInput');
    if (!input.value.trim()) return;
    addChatMsg(Auth.getUser()?.username||'You', input.value);
    input.value='';
  }

  function toggleMic() {
    if (!stream) return;
    const t=stream.getAudioTracks()[0];
    if (t) { t.enabled=!t.enabled; document.getElementById('micBtn').innerHTML=`<i class="ti ti-microphone${t.enabled?'':'-off'}"></i>`; }
  }

  function toggleCam() {
    if (!stream) return;
    const t=stream.getVideoTracks()[0];
    if (t) { t.enabled=!t.enabled; document.getElementById('camBtn').innerHTML=`<i class="ti ti-video${t.enabled?'':'-off'}"></i>`; }
  }

  async function shareScreen() {
    try {
      const ss=await navigator.mediaDevices.getDisplayMedia({video:true});
      document.getElementById('liveVideo').srcObject=ss;
      Toast.show('Screen sharing started.','info');
    } catch { Toast.show('Screen share cancelled.','warning'); }
  }

  function endLive() {
    if (!confirm('End the live stream?')) return;
    isLive=false;
    clearInterval(liveTimer);
    if (stream) stream.getTracks().forEach(t=>t.stop());
    Toast.show(`Stream ended. ${viewers} viewers, $${tipsTotal} in tips.`,'info');
    setTimeout(()=>window.location.href='/creator/dashboard.html', 1500);
  }

  function setGoal(label, amount) { Toast.show(`Goal: ${label} for ${amount}!`,'info'); }
</script>
</body>
</html>
